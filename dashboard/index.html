ls when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Read README.md, then create notes/readme-title.txt containing only the README title."}, {"role": "assistant", "step": 1, "thought": "Start by reading the README.md file to get its content.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 604, "completion_tokens": 98, "total_tokens": 702, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 35}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 92}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md"}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "assistant", "step": 2, "thought": "Read README.md content already obtained. The title is '# LLM Agent Harness'. Now write that title to notes/readme-title.txt.", "tool_calls": [{"name": "write_file", "arguments": {"path": "notes/readme-title.txt", "content": "# LLM Agent Harness"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 8407, "completion_tokens": 303, "total_tokens": 8710, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 217}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 8151}}, {" ssages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Use the read_file tool to read README.md, then summarize this project in 5 bullet points."}, {"role": "assistant", "step": 1, "thought": "Need to read README.md to summarize the project.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 605, "completion_tokens": 83, "total_tokens": 688, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 22}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 93}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md"}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the `, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "assistant", "step": 2, "thought": "READMe title is '# LLM Agent Harness'. Write it to notes/readme-title.txt.", "tool_calls": [{"name": "write_file", "arguments": {"path": "notes/readme-title.txt", "content": "# LLM Agent Harness"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 8405, "completion_tokens": 149, "total_tokens": 8554, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 63}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 8149}}, {"role": "tool", "name": "write_file", "arguments": {"path": "notes/readme-title.txt", "content": "# LLM Agent Harness"}, "content": "{\"ok\": true, \"result\": {\"path\": \"/Users/tomzhang/Desktop/llm-agent-harness/notes/readme-title.txt\", \"bytes\": 19}}"}, {"role": "assistant", "step": 3, "thought": "Task complete: read README.md, extracted title '# LLM Agent Harness', wrote to notes/readme-title.txt.", "tool_calls": [], "final": "Created notes/readme-title.txt with the README title: # LLM Agent Harness", "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 4994, "completion_tokens": 180, "total_tokens": 5174, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 114}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 4738}}], "_source": "/Users/tomzhang/Desktop/llm-agent-harness/runs/20260629T151224Z-4a9a25ec.json", "tool_sequence": ["read_file", "write_file"], "usage": {"prompt_tokens": 14003, "completion_tokens": 633, "total_tokens": 14636, "prompt_cache_hit_tokens": 1024, "prompt_cache_miss_tokens": 12979}}, {"run_id": "20260629T151436Z-bf03215a", "task": "Answer this without using shell: what is 2 + 2?", "status": "completed", "final": "4", "messages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. oints.", "status": "completed", "final": "- **Lightweight LLM Agent Harness**: A locally runnable, model-agnostic framework for building and testing LLM agents with a built-in agent loop, tool registry, and provider adapters for multiple LLM APIs.\n- **Tool Registry**: Includes built-in tools: `list_dir`, `read_file`, `write_file`, and `run_shell`, with permission policies like read-only mode, shell allowlists, and dangerous command blocking.\n- **Evaluation & Determinism**: Comes with an evaluation benchmark that checks success rate, tool accuracy, latency, token usage, cost, and failure categories; also supports determinism checks by running the same task multiple times.\n- **Trace, Replay & Dashboard**: Every run produces a JSON transcript; you can render traces as Markdown with Mermaid flowcharts, replay runs for debugging, and generate a static HTML dashboard summarizing evaluations and runs.\n- **Local RAG & Extensibility**: Includes a local RAG index that works without an embedding API using lexical retrieval, and outlines planned extensions like a Web UI, concurrent task execution, and embedding-backed RAG.", "messages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Use the read_file tool to read README.md, then summarize this project in 5 bullet points."}, {"role": "assistant", "step": 1, "thought": "No prior observation, need to read README.md first.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 605, "completion_tokens": 80, "total_tokens": 685, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 18}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 93}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md"}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "assistant", "step": 2, "thought": "The README.md has been read successfully and contains all necessary information to summarize the project in 5 bullet points.", "tool_calls": [], "final": "- **Lightweight LLM Agent Harness**: A locally runnable, model-agnostic framework for building and testing LLM agents with a built-in agent loop, tool registry, and provider adapters for multiple LLM APIs.\n- **Tool Registry**: Includes built-in tools: `list_dir`, `read_file`, `write_file`, and `run_shell`, with permission policies like read-only mode, shell allowlists, and dangerous command blocking.\n- **Evaluation & Determinism**: Comes with an evaluation benchmark that checks success rate, tool accuracy, latency, token usage, cost, and failure categories; also supports determinism checks by running the same task multiple times.\n- **Trace, Replay & Dashboard**: Every run produces a JSON transcript; you can render traces as Markdown with Mermaid flowcharts, replay runs for debugging, and generate a static HTML dashboard summarizing evaluations and runs.\n- **Local RAG & Extensibility**: Includes a local RAG index that works without an embedding API using lexical retrieval, and outlines planned extensions like a Web UI, concurrent task execution, and embedding-backed RAG.", "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 8407, "completion_to l_tokens": 1781, "prompt_cache_hit_tokens": 768, "prompt_cache_miss_tokens": 696}}, {"run_id": "20260629T151744Z-07163df5", "task": "Use run_shell to run pwd and report the current directory.", "status": "completed", "final": "The current directory is /Users/tomzhang/Desktop/llm-agent-harness.", "messages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Use run_shell to run pwd and report the current directory."}, {"role": "assistant", "step": 1, "thought": "Need to run pwd to get current directory.", "tool_calls": [{"name": "run_shell", "arguments": {"command": "pwd"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 598, "completion_tokens": 84, "total_tokens": 682, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 31}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 86}}, {"role": "tool", "name": "run_shell", "arguments": {"command": "pwd"}, "content": "{\"ok\": true, \"result\": {\"returncode\": 0, \"stdout\": \"/Users/tomzhang/Desktop/llm-agent-harness\\n\", \"stderr\": \"\"}}"}, {"role": "assistant", "step": 2, "thought": "The pwd command succeeded and returned the current directory.", "tool_calls": [], "final": "The current directory is /Users/tomzhang/Desktop/llm-agent-harness.", "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 900, "completion_tokens": 113, "total_tokens": 1013, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 62}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 644}}], "_source": "/Users/tomzhang/Desktop/llm-agent-harness/runs/20260629T151744Z-07163df5.json", "tool_sequence": ["run_shell"], "usage": {"prompt_tokens": 1498, "completion_tokens": 197, "total_tokens": 1695, "prompt_cache_hit_tokens": 768, "prompt_cache_miss_tokens": 730}}, {"run_id": "20260629T151747Z-ac01f63b", "task": "Read README.md, then create notes/readme-title.txt containing only the README title.", "status": "completed", "final": "Created notes/readme-title.txt containing the README title: LLM Agent Harness.", "messages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Read README.md, then create notes/readme-title.txt containing only the README title."}, {"role": "assistant", "step": 1, "thought": "Need to read README.md to get its title.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md", "limit": 20000}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 604, "completion_tokens": 124, "total_tokens": 728, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 55}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 92}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md", "limit": 20000}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "assistant", "step": 2, "thought": "The README title is 'LLM Agent Harness'. I will create the file now.", "tool_calls": [{"name": "write_file", "arguments": {"path": "notes/readme-title.txt", "content": "LLM Agent Harness /Users/tomzhang/Desktop/llm-agent-harness/missing-file-does-not-exist.txt'\"}"}, {"role": "assistant", "step": 2, "thought": "The read_file tool returned an error indicating the file does not exist. I can now explain the error briefly.", "tool_calls": [], "final": "The attempt to read 'missing-file-does-not-exist.txt' failed because the file does not exist. The error message was: [Errno 2] No such file or directory. This typically happens when the specified path is incorrect or the file has been deleted.", "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 922, "completion_tokens": 154, "total_tokens": 1076, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 57}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 666}}], "_source": "/Users/tomzhang/Desktop/llm-agent-harness/runs/20260629T151756Z-9333879a.json", "tool_sequence": ["read_file"], "usage": {"prompt_tokens": 1524, "completion_tokens": 276, "total_tokens": 1800, "prompt_cache_hit_tokens": 768, "prompt_cache_miss_tokens": 756}}], "rag": {"workspace": "/Users/tomzhang/Desktop/llm-agent-harness", "chunk_count": 72, "chunks": [{"source": "README.md", "chunk_id": 1, "text": "# LLM Agent Harness\n\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\n\nThis README assumes the project folder is on your Desktop and is named:\n\n```text\n~/Desktop/llm-agent-harness\n```\n\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\n\n## What It Provides\n\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\n- Run transcripts: each task writes a JSON transcript under `runs/`\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\n- Determinism checks: run the same task repeatedly and measure consistency\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\n\n## Quick Start\n\n```bash\ncd ~/Desktop/llm-agent-harness\npython3 -m agent_harness.cli \"List files in the workspace\" --llm mock\n```\n\nYou should see:\n\n```text\nstatus: completed\n```\n\n## Project Structure"}, {"source": "README.md", "chunk_id": 2, "text": "```text\nagent_harness/\n  cli.py       # Command-line entry point\n  core.py      # Agent loop and transcript writing\n  dashboard.py # Static HTML dashboard generation\n  determinism.py # Repeated-run consistency checks\n  llm.py       # Mock and subprocess LLM adapters\n  eval.py      # Evaluation runner and report generation\n  rag.py       # Local lexical RAG index and query helpers\n  trace.py     # Trace rendering and transcript replay\n  tools.py     # Tool registry and built-in tools\nproviders/\n  __init__.py\n  base.py\n  echo.py\n  openai.py\n  openai_compatible.py\n  anthropic.py\n  gemini.py\n  ollama.py\n  azure_openai.py\n  deepseek.py\n  groq.py\n```\n\n## How Providers Work\n\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\n\nRun any provider with this pattern:\n\n```bash\npython3 -m agent_harness.cli \"Your task here\" --llm-cmd \"python3 -m providers.PROVIDER_NAME\"\n```\n\nFor example:\n\n```bash\npython3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.deepseek\"\n```\n\n## Provider Setup\n\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files."}, {"source": "README.md", "chunk_id": 3, "text": "| Provider | Module | Required setup | Example command |\n| --- | --- | --- | --- |\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.echo\"` |\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.openai\"` |\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.openai_compatible\"` |\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.anthropic\"` |\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.gemini\"` |\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.ollama\"` |\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.azure_openai\"` |\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m age"}, {"source": "README.md", "chunk_id": 4, "text": "nt_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.deepseek\"` |\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.groq\"` |"}, {"source": "README.md", "chunk_id": 5, "text": "## DeepSeek Example\n\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\n\n```bash\ncd ~/Desktop/llm-agent-harness\n\nexport DEEPSEEK_API_KEY=\"your-deepseek-api-key\"\nexport DEEPSEEK_MODEL=\"deepseek-v4-flash\"\n\npython3 -m agent_harness.cli \"List files in the workspace\" --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nTo use the stronger V4 Pro model:\n\n```bash\nexport DEEPSEEK_MODEL=\"deepseek-v4-pro\"\n```\n\n## Evaluation Benchmark\n\nThe project includes a small evaluation runner under `evals/`.\n\nRun the default benchmark with DeepSeek:\n\n```bash\ncd ~/Desktop/llm-agent-harness\nexport DEEPSEEK_API_KEY=\"your-deepseek-api-key\"\nexport DEEPSEEK_MODEL=\"deepseek-v4-flash\"\n\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nIf a provider is slow, increase the subprocess timeout:\n\n```bash\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nThe eval runner writes:\n\n- JSONL results under `evals/results/`\n- Markdown reports under `evals/reports/`\n- Per-run transcripts under `runs/`\n\nEach eval task checks:\n\n- expected final status\n- expected tool calls\n- expected text in the final answer\n- forbidden tool calls\n- expected text in tool observations\n- latency\n- token usage when the provider returns usage data\n- estimated cost when pricing is configured\n- prompt and completion cost breakdown\n- failure category classification\n- provider errors and timeouts\n\nThe default task file is:\n\n```text\nevals/tasks.jsonl\n```"}, {"source": "README.md", "chunk_id": 6, "text": "The expanded benchmark covers:\n\n- directory listing\n- provider directory inspection\n- READM
