E summarization\n- pricing config reading\n- flat file writing\n- nested file writing\n- workspace path escape denial\n- shell denial without permission\n- shell execution with explicit permission\n- multi-step read-then-write workflows\n- avoiding unnecessary shell usage\n- missing-file error handling\n\nThe default pricing file is:\n\n```text\nevals/pricing.json\n```\n\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\n\n## Failure Classification\n\nEvaluation results classify failures into categories that are more useful than a generic failed status:\n\n- `success`\n- `planning_error`\n- `tool_error`\n- `timeout`\n- `hallucination`\n- `permission_denied`\n- `api_error`\n- `rate_limit`\n- `failed`\n\nThe category is stored in JSONL results and shown in Markdown reports.\n\n## Trace Visualization\n\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\n\n```bash\npython3 -m agent_harness.cli trace --run-id RUN_ID\n```\n\nThis creates:\n\n```text\nruns/RUN_ID.trace.md\n```\n\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\n\n## Replay\n\nReplay a saved run without calling a model:\n\n```bash\npython3 -m agent_harness.cli replay --run-id RUN_ID\n```\n\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\n\n## Determinism"}, {"source": "README.md", "chunk_id": 7, "text": "Run the same task repeatedly to measure stability:\n\n```bash\npython3 -m agent_harness.cli determinism \\\n  --task \"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\" \\\n  --runs 20 \\\n  --llm-timeout 300 \\\n  --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nThe determinism runner writes:\n\n- JSONL run records under `evals/determinism/`\n- Markdown consistency reports under `evals/determinism/`\n\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\n\n## Environment Variables\n\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\n\nExample:\n\n```bash\nexport DEEPSEEK_API_KEY=\"your-deepseek-api-key\"\nexport DEEPSEEK_MODEL=\"deepseek-v4-flash\"\n```\n\n## Optional SDK Dependencies\n\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\n\n```bash\npython3 -m venv .venv\nsource .venv/bin/activate\npython3 -m pip install openai\n```\n\nDeepSeek does not require the OpenAI Python SDK.\n\n## Subprocess Protocol\n\nThe harness sends this JSON payload to a provider:\n\n```json\n{\n  \"messages\": [],\n  \"tools\": [],\n  \"max_tool_calls\": 8\n}\n```\n\nThe provider returns a JSON object like this to call a tool:\n\n```json\n{\n  \"thought\": \"I should inspect the files.\",\n  \"tool_calls\": [\n    {\"name\": \"list_dir\", \"arguments\": {\"path\": \".\"}}\n  ],\n  \"final\": null\n}\n```"}, {"source": "README.md", "chunk_id": 8, "text": "When the task is complete, the provider returns:\n\n```json\n{\n  \"thought\": \"I have enough information.\",\n  \"tool_calls\": [],\n  \"final\": \"Here is the answer.\"\n}\n```\n\n## Shell Access\n\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\n\n```bash\npython3 -m agent_harness.cli \"Run tests\" --allow-shell --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nUse shell allowlists to restrict which executables can run:\n\n```bash\npython3 -m agent_harness.cli \"Run pwd and list files.\" \\\n  --allow-shell \\\n  --shell-allow pwd \\\n  --shell-allow ls \\\n  --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nUse read-only mode when the agent should inspect but not write files:\n\n```bash\npython3 -m agent_harness.cli \"Inspect the project structure.\" \\\n  --read-only \\\n  --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\n\n## Static Dashboard\n\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\n\n```bash\npython3 -m agent_harness.cli dashboard\n```\n\nOpen the generated file:\n\n```text\ndashboard/index.html\n```\n\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\n\n## Local RAG\n\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\n\n```bash\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\n```\n\nAsk a question with citations:"}, {"source": "README.md", "chunk_id": 9, "text": "This local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\n\n## Next Extensions\n\n- Add a Web UI or TUI for inspecting each tool call\n- Add concurrent task execution and retry handling\n- Add embedding-backed RAG and PDF extraction"}, {"source": "agent_harness/__init__.py", "chunk_id": 1, "text": "\"\"\"A small, model-agnostic LLM agent harness.\"\"\"\n\n__all__ = [\"__version__\"]\n__version__ = \"0.1.0\""}, {"source": "agent_harness/cli.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nimport argparse\nfrom pathlib import Path\nimport sys\n\nfrom .core import AgentConfig, AgentHarness\nfrom .dashboard import build_dashboard\nfrom .determinism import run_determinism\nfrom .eval import run_eval\nfrom .llm import MockLLM, SubprocessLLM\nfrom .rag import build_rag_index, query_rag_index\nfrom .tools import PermissionPolicy, build_default_tools\nfrom .trace import load_transcript, replay_transcript, write_trace_markdown\n\ndef build_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Run a task through the LLM Agent Harness.\")\n    add_run_arguments(parser)\n    return parser"}, {"source": "agent_harness/cli.py", "chunk_id": 2, "text": "def build_eval_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Run an evaluation task set.\")\n    parser.add_argument(\"--tasks\", default=\"evals/tasks.jsonl\", help=\"JSONL eval task file.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root exposed to tools.\")\n    parser.add_argument(\"--max-steps\", type=int, default=8, help=\"Maximum agent loop steps.\")\n    parser.add_argument(\"--llm-timeout\", type=int, default=240, help=\"LLM subprocess timeout in seconds.\")\n    parser.add_argument(\"--llm-cmd\", help=\"Command for a JSON-speaking external LLM adapter.\")\n    parser.add_argument(\"--results-dir\", default=\"evals/results\", help=\"Directory for JSONL eval results.\")\n    parser.add_argument(\"--reports-dir\", default=\"evals/reports\", help=\"Directory for Markdown eval reports.\")\n    parser.add_argument(\"--pricing\", default=\"evals/pricing.json\", help=\"JSON pricing file for cost estimates.\")\n    add_permission_arguments(parser)\n    return parser\n\ndef build_trace_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Render a run transcript as a Markdown trace.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root.\")\n    parser.add_argument(\"--run-id\", help=\"Run ID from the runs directory.\")\n    parser.add_argument(\"--transcript\", help=\"Path to a transcript JSON file.\")\n    parser.add_argument(\"--output\", help=\"Output Markdown path. Defaults to runs/<run_id>.trace.md.\")\n    return parser"}, {"source": "agent_harness/cli.py", "chunk_id": 3, "text": "def build_replay_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Replay a saved transcript without calling a model.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root.\")\n    parser.add_argument(\"--run-id\", help=\"Run ID from the runs directory.\")\n    parser.add_argument(\"--transcript\", help=\"Path to a transcript JSON file.\")\n    return parser\n\ndef build_determinism_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Run the same task multiple times and measure consistency.\")\n    parser.add_argument(\"--task\", required=True, help=\"Task to run repeatedly.\")\n    parser.add_argument(\"--runs\", type=int, default=20, help=\"Number of repeated runs.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root exposed to tools.\")\n    parser.add_argument(\"--max-steps\", type=int, default=8, help=\"Maximum agent loop steps.\")\n    parser.add_argument(\"--llm-timeout\", type=int, default=240, help=\"LLM subprocess timeout in seconds.\")\n    parser.add_argument(\"--llm-cmd\", help=\"Command for a JSON-speaking external LLM adapter.\")\n    parser.add_argument(\"--allow-shell\", action=\"store_true\", help=\"Enable the run_shell tool.\")\n    parser.add_argument(\"--output-dir\", default=\"evals/determinism\", help=\"Directory for determinism reports.\")\n    add_permission_arguments(parser)\n    return parser"}, {"source": "agent_harness/cli.py", "chunk_id": 4, "text": "def build_dashboard_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Generate a static HTML dashboard.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root.\")\n    parser.add_argument(\"--output\", default=\"dashboard/index.html\", help=\"Output HTML path.\")\n    return parser\n\ndef build_rag_index_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Build a local lexical RAG index.\")\n    parser.add_argument(\"paths\", nargs=\"*\", default=[\".\"], help=\"Files or directories to index.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root.\")\n    parser.add_argument(\"--output\", default=\"rag/index.json\", help=\"Output index JSON path.\")\n    parser.add_argument(\"--chunk-chars\", type=int, default=1600, help=\"Approximate chunk size.\")\n    return parser\n\ndef build_rag_query_parser() -> argparse.ArgumentParser:\n    parser = argparse.ArgumentParser(description=\"Query a local RAG index with citations.\")\n    parser.add_argument(\"question\", help=\"Question to answer from indexed files.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root.\")\n    parser.add_argument(\"--index\", default=\"rag/index.json\", help=\"RAG index JSON path.\")\n    parser.add_argument(\"--top-k\", type=int, default=3, help=\"Number of chunks to return.\")\n    return parser"}, {"source": "agent_harness/cli.py", "chunk_id": 5, "text": "def add_run_arguments(parser: argparse.ArgumentParser) -> None:\n    parser.add_argument(\"task\", help=\"Task for the agent.\")\n    parser.add_argument(\"--workspace\", default=\".\", help=\"Workspace root exposed to tools.\")\n    parser.add_argument(\"--max-steps\", type=int, default=8, help=\"Maximum agent loop steps.\")\n    parser.add_argument(\"--llm\", choices=[\"mock\"], default=\"mock\", help=\"Built-in LLM adapter.\")\n    parser.add_argument(\"--llm-cmd\", help=\"Command for a JSON-speaking external LLM adapter.\")\n    parser.add_argument(\"--allow-shell\", action=\"store_true\", help=\"Enable the run_shell tool.\")\n    parser.add_argument(\"--llm-timeout\", type=int, default=240, help=\"LLM subprocess timeout in seconds.\")\n    add_permission_arguments(parser)\n\ndef add_permission_arguments(parser: argparse.ArgumentParser) -> None:\n    parser.add_argument(\"--read-only\", action=\"store_true\", help=\"Disable write_file.\")\n    parser.add_argument(\n        \"--shell-allow\",\n        action=\"append\",\n        default=[],\n        help=\"Allow one shell executable. Can be repeated, for example --shell-allow pwd --shell-allow ls.\",\n    )\n    parser.add_argument(\n        \"--max-write-bytes\",\n        type=int,\n        default=1_000_000,\n        help=\"Maximum bytes write_file can write in one call.\",\n    )"}, {"source": "agent_harness/cli.py", "chunk_id": 6, "text": "def main(argv: list[str] | None = None) -> int:\n    argv = list(sys.argv[1:] if argv is None else argv)\n    if argv and argv[0] == \"eval\":\n        args = build_eval_parser().parse_args(argv[1:])\n        return run_eval_command(args)\n    if argv and argv[0] == \"trace\":\n        args = build_trace_parser().parse_args(argv[1:])\n        return run_trace_command(args)\n    if argv and argv[0] == \"replay\":\n        args = build_replay_parser().parse_args(argv[1:])\n        return run_replay_command(args)\n    if argv and argv[0] == \"determinism\":\n        args = build_determinism_parser().parse_args(argv[1:])\n        return run_determinism_command(args)\n    if argv and argv[0] == \"dashboard\":\n        args = build_dashboard_parser().parse_args(argv[1:])\n        return run_dashboard_command(args)\n    if argv and argv[0] == \"rag-index\":\n        args = build_rag_index_parser().parse_args(argv[1:])\n        return run_rag_index_command(args)\n    if argv and argv[0] == \"rag-query\":\n        args = build_rag_query_parser().parse_args(argv[1:])\n        return run_rag_query_command(args)\n    if argv and argv[0] == \"run\":\n        argv = argv[1:]\n\nargs = build_parser().parse_args(argv)\n    workspace = Path(args.workspace).resolve()\n    workspace.mkdir(parents=True, exist_ok=True)"}, {"source": "agent_harness/cli.py", "chunk_id": 7, "text": "llm = SubprocessLLM(args.llm_cmd, timeout=args.llm_timeout) if args.llm_cmd else MockLLM()\n    tools = build_default_tools(\n        workspace,\n        allow_shell=args.allow_shell,\n        policy=build_permission_policy(args),\n    )\n    harness = AgentHarness(\n        llm=llm,\n        tools=tools,\n        config=AgentConfig(workspace=workspace, max_steps=args.max_steps),\n    )\n    run = harness.run(args.task)\n\nprint(f\"run_id: {run.run_id}\")\n    print(f\"status: {run.status}\")\n    print()\n    print(run.final or \"\")\n    return 0 if run.status in {\"completed\", \"stopped\"} else 1\n\ndef run_eval_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    results_path, report_path, results = run_eval(\n        tasks_path=Path(args.tasks).resolve(),\n        workspace=workspace,\n        llm_cmd=args.llm_cmd,\n        max_steps=args.max_steps,\n        llm_timeout=args.llm_timeout,\n        results_dir=(workspace / args.results_dir).resolve(),\n        reports_dir=(workspace / args.reports_dir).resolve(),\n        pricing_path=(workspace / args.pricing).resolve(),\n        policy=build_permission_policy(args),\n    )\n    passed = sum(1 for result in results if result.passed)\n    total = len(results)\n    print(f\"tasks: {total}\")\n    print(f\"passed: {passed}\")\n    print(f\"failed: {total - passed}\")\n    print(f\"results: {results_path}\")\n    print(f\"report: {report_path}\")\n    return 0 if passed == total else 1"}, {"source": "agent_harness/cli.py", "chunk_id": 8, "text": "def run_trace_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    output = Path(args.output).resolve() if args.output else None\n    transcript = Path(args.transcript).resolve() if args.transcript else None\n    output_path = write_trace_markdown(\n        workspace=workspace,\n        run_id=args.run_id,\n        transcript=transcript,\n        output=output,\n    )\n    print(f\"trace: {output_path}\")\n    return 0\n\ndef run_replay_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    transcript = Path(args.transcript).resolve() if args.transcript else None\n    data = load_transcript(workspace=workspace, run_id=args.run_id, transcript=transcript)\n    print(replay_transcript(data))\n    return 0\n\ndef run_determinism_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    results_path, report_path, results = run_determinism(\n        task=args.task,\n        workspace=workspace,\n        runs=args.runs,\n        llm_cmd=args.llm_cmd,\n        max_steps=args.max_steps,\n        llm_timeout=args.llm_timeout,\n        allow_shell=args.allow_shell,\n        output_dir=(workspace / args.output_dir).resolve(),\n        policy=build_permission_policy(args),\n    )\n    completed = sum(1 for result in results if result.status == \"completed\")\n    total = len(results)\n    print(f\"runs: {total}\")\n    print(f\"completed: {completed}\")\n    print(f\"results: {results_path}\")\n    print(f\"report: {report_path}\")\n    return 0 if completed == total else 1"}, {"source": "agent_harness/cli.py", "chunk_id": 9, "text": "def run_dashboard_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    output = (workspace / args.output).resolve()\n    output_path = build_dashboard(workspace, output=output)\n    print(f\"dashboard: {output_path}\")\n    return 0\n\ndef run_rag_index_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    output = (workspace / args.output).resolve()\n    output_path = build_rag_index(\n        workspace=workspace,\n        inputs=args.paths,\n        output=output,\n        chunk_chars=args.chunk_chars,\n    )\n    print(f\"index: {output_path}\")\n    return 0\n\ndef run_rag_query_command(args: argparse.Namespace) -> int:\n    workspace = Path(args.workspace).resolve()\n    index_path = (workspace / args.index).resolve()\n    print(query_rag_index(index_path=index_path, question=args.question, top_k=args.top_k))\n    return 0\n\ndef build_permission_policy(args: argparse.Namespace) -> PermissionPolicy:\n    shell_allowlist = list(args.shell_allow) if getattr(args, \"shell_allow\", None) else None\n    return PermissionPolicy(\n        read_only=bool(getattr(args, \"read_only\", False)),\n        shell_allowlist=shell_allowlist,\n        max_write_bytes=int(getattr(args, \"max_write_bytes\", 1_000_000)),\n    )\n\nif __name__ == \"__main__\":\n    raise SystemExit(main(sys.argv[1:]))"}, {"source": "agent_harness/core.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nfrom dataclasses import dataclass, field\nfrom datetime import datetime, timezone\nimport json\nfrom pathlib import Path\nfrom typing import Any, Protocol\nfrom uuid import uuid4\n\nfrom .tools import ToolRegistry\n\nclass LLM(Protocol):\n    def complete(self, payload: dict[str, Any]) -> dict[str, Any]:\n        \"\"\"Return a dict with optional thought, tool_calls, and final fields.\"\"\"\n\n@dataclass\nclass AgentConfig:\n    workspace: Path\n    max_steps: int = 8\n    run_dir: Path = Path(\"runs\")\n    system_prompt: str = (\n        \"You are an agent running in a harness. Use tools when useful. \"\n        \"Return a final answer once the task is complete.\"\n    )\n\n@dataclass\nclass AgentRun:\n    task: str\n    run_id: str = field(default_factory=lambda: datetime.now(timezone.utc).strftime(\"%Y%m%dT%H%M%SZ\") + \"-\" + uuid4().hex[:8])\n    messages: list[dict[str, Any]] = field(default_factory=list)\n    status: str = \"running\"\n    final: str | None = None\n\nclass AgentHarness:\n    def __init__(self, llm: LLM, tools: ToolRegistry, config: AgentConfig):\n        self.llm = llm\n        self.tools = tools\n        self.config = config\n\ndef run(self, task: str) -> AgentRun:\n        run = AgentRun(task=task)\n        run.messages.append({\"role\": \"system\", \"content\": self.config.system_prompt})\n        run.messages.append({\"role\": \"user\", \"content\": task})"}, {"source": "agent_harness/core.py", "chunk_id": 2, "text": "for step in range(1, self.config.max_steps + 1):\n            response = self.llm.complete(\n                {\n                    \"messages\": run.messages,\n                    \"tools\": self.tools.schemas(),\n                    \"max_tool_calls\": self.config.max_steps - step + 1,\n                }\n            )\n            assistant_message = {\n                \"role\": \"assistant\",\n                \"step\": step,\n                \"thought\": response.get(\"thought\"),\n                \"tool_calls\": response.get(\"tool_calls\", []),\n                \"final\": response.get(\"final\"),\n                \"provider\": response.get(\"provider\"),\n                \"model\": response.get(\"model\"),\n                \"usage\": response.get(\"usage\"),\n            }\n            run.messages.append(assistant_message)\n\nfinal = response.get(\"final\")\n            if final:\n                run.status = \"completed\"\n                run.final = str(final)\n                self._write_transcript(run)\n                return run\n\ntool_calls = response.get(\"tool_calls\") or []\n            if not isinstance(tool_calls, list):\n                run.messages.append(\n                    {\n                        \"role\": \"tool\",\n                        \"name\": \"harness_error\",\n                        \"content\": \"tool_calls must be a list\",\n                    }\n                )\n                continue\n\nif not tool_calls:\n                run.status = \"stopped\"\n                run.final = \"The model stopped without a final answer or tool call.\"\n                self._write_transcript(run)\n                return run"}, {"source": "agent_harness/core.py", "chunk_id": 3, "text": "for call in tool_calls:\n                name = call.get(\"name\")\n                arguments = call.get(\"arguments\") or {}\n                observation = self.tools.call(name, arguments)\n                run.messages.append(\n                    {\n                        \"role\": \"tool\",\n                        \"name\": name,\n                        \"arguments\": arguments,\n                        \"content\": observation,\n                    }\n                )\n\nrun.status = \"max_steps_exceeded\"\n        run.final = f\"Stopped after {self.config.max_steps} steps without a final answer.\"\n        self._write_transcript(run)\n        return run\n\ndef _write_transcript(self, run: AgentRun) -> Path:\n        run_dir = self.config.workspace / self.config.run_dir\n        run_dir.mkdir(parents=True, exist_ok=True)\n        path = run_dir / f\"{run.run_id}.json\"\n        path.write_text(\n            json.dumps(\n                {\n                    \"run_id\": run.run_id,\n                    \"task\": run.task,\n                    \"status\": run.status,\n                    \"final\": run.final,\n                    \"messages\": run.messages,\n                },\n                indent=2,\n                ensure_ascii=False,\n            )\n            + \"\\n\",\n            encoding=\"utf-8\",\n        )\n        return path"}, {"source": "agent_harness/dashboard.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nimport html\nimport json\nfrom pathlib import Path\nfrom typing import Any\n\ndef build_dashboard(workspace: Path, output: Path | None = None) -> Path:\n    output_path = output or workspace / \"dashboard\" / \"index.html\"\n    output_path.parent.mkdir(parents=True, exist_ok=True)\n    eval_results = load_jsonl_files(workspace / \"evals\" / \"results\")\n    determinism_results = load_jsonl_files(workspace / \"evals\" / \"determinism\")\n    runs = sorted((workspace / \"runs\").glob(\"*.json\")) if (workspace / \"runs\").exists() else []\n    output_path.write_text(\n        render_dashboard(workspace, eval_results, determinism_results, runs),\n        encoding=\"utf-8\",\n    )\n    return output_path\n\ndef load_jsonl_files(directory: Path) -> list[dict[str, Any]]:\n    rows: list[dict[str, Any]] = []\n    if not directory.exists():\n        return rows\n    for path in sorted(directory.glob(\"*.jsonl\")):\n        for line in path.read_text(encoding=\"utf-8\").splitlines():\n            if not line.strip():\n                continue\n            item = json.loads(line)\n            item[\"_source\"] = str(path)\n            rows.append(item)\n    return rows"}, {"source": "agent_harness/dashboard.py", "chunk_id": 2, "text": "def render_dashboard(\n    workspace: Path,\n    eval_results: list[dict[str, Any]],\n    determinism_results: list[dict[str, Any]],\n    runs: list[Path],\n) -> str:\n    total_evals = len(eval_results)\n    passed_evals = sum(1 for item in eval_results if item.get(\"passed\"))\n    completed_determinism = sum(1 for item in determinism_results if item.get(\"status\") == \"completed\")\n    total_cost = sum(float(item.get(\"cost_usd\") or 0.0) for item in eval_results)\n    avg_latency = (\n        sum(float(item.get(\"latency_seconds\") or 0.0) for item in eval_results) / total_evals\n        if total_evals\n        else 0.0\n    )\n    latest_eval_rows = eval_results[-20:]\n    latest_det_rows = determinism_results[-20:]"}, {"source": "agent_harness/dashboard.py", "chunk_id": 3, "text": "return f\"\"\"<!doctype html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>LLM Agent Harness Dashboard<\/title>\n  <style>\n    body {{\n      margin: 0;\n      font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n      color: #172026;\n      background: #f5f7f8;\n    }}\n    header {{\n      padding: 28px 36px 18px;\n      background: #ffffff;\n      border-bottom: 1px solid #dfe5e8;\n    }}\n    h1 {{ margin: 0 0 8px; font-size: 28px; }}\n    main {{ padding: 24px 36px 40px; }}\n    .grid {{ display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 12px; }}\n    .metric, section {{\n      background: #ffffff;\n      border: 1px solid #dfe5e8;\n      border-radius: 8px;\n    }}\n    .metric {{ padding: 16px; }}\n    .label {{ color: #66747c; font-size: 13px; }}\n    .value {{ font-size: 26px; font-weight: 700; margin-top: 6px; }}\n    section {{ margin-top: 18px; overflow: hidden; }}\n    h2 {{ margin: 0; padding: 16px 18px; font-size: 18px; border-bottom: 1px solid #dfe5e8; }}\n    table {{ width: 100%; border-collapse: collapse; font-size: 14px; }}\n    th, td {{ padding: 10px 12px; border-bottom: 1px solid #edf1f3; text-align: left; vertical-align: top; }}\n    th {{ color: #51616a; font-weight: 600; background: #fafbfb; }}\n    code {{ background: #edf1f3; padding: 2px 4px; border-radius: 4px; }}\n    @media (max-width: 820px) {{ .grid {{ grid-template-columns: 1fr 1fr; }} main, header {{ padding-left: 18px; padding-right: 18px; }} }}\n  <\/style>\n<\/head>\n<body>\n  <header>\n    <h1>LLM A"}, {"source": "agent_harness/dashboard.py", "chunk_id": 4, "text": "gent Harness Dashboard<\/h1>\n    <div class=\"label\">{escape(str(workspace))}<\/div>\n  <\/header>\n  <main>\n    <div class=\"grid\">\n      {metric(\"Eval pass rate\", percent(passed_evals, total_evals))}\n      {metric(\"Eval tasks\", str(total_evals))}\n      {metric(\"Average latency\", f\"{avg_latency:.2f}s\")}\n      {metric(\"Estimated cost\", f\"${total_cost:.6f}\")}\n      {metric(\"Transcripts\", str(len(runs)))}\n      {metric(\"Determinism runs\", str(len(determinism_results)))}\n      {metric(\"Completed stability runs\", str(completed_determinism))}\n      {metric(\"Workspace\", \"ready\")}\n    <\/div>\n    <section>\n      <h2>Latest Evaluation Results<\/h2>\n      {render_eval_table(latest_eval_rows)}\n    <\/section>\n    <section>\n      <h2>Latest Determinism Runs<\/h2>\n      {render_determinism_table(latest_det_rows)}\n    <\/section>\n  <\/main>\n<\/body>\n<\/html>\n\"\"\""}, {"source": "agent_harness/dashboard.py", "chunk_id": 5, "text": "def metric(label: str, value: str) -> str:\n    return f'<div class=\"metric\"><div class=\"label\">{escape(label)}<\/div><div class=\"value\">{escape(value)}<\/div><\/div>'\n\ndef render_eval_table(rows: list[dict[str, Any]]) -> str:\n    if not rows:\n        return \"<p>No evaluation results yet.<\/p>\"\n    body = []\n    for item in rows:\n        body.append(\n            \"<tr>\"\n            f\"<td><code>{escape(str(item.get('task_id', '')))}<\/code><\/td>\"\n            f\"<td>{escape(str(item.get('status', '')))}<\/td>\"\n            f\"<td>{'yes' if item.get('passed') else 'no'}<\/td>\"\n            f\"<td>{escape(str(item.get('failure_category', '')))}<\/td>\"\n            f\"<td>{float(item.get('latency_seconds') or 0.0):.2f}s<\/td>\"\n            f\"<td>${float(item.get('cost_usd') or 0.0):.6f}<\/td>\"\n            f\"<td><code>{escape(str(item.get('run_id', '')))}<\/code><\/td>\"\n            \"<\/tr>\"\n        )\n    return (\n        \"<table><thead><tr><th>Task<\/th><th>Status<\/th><th>Passed<\/th><th>Category<\/th>\"\n        \"<th>Latency<\/th><th>Cost<\/th><th>Run ID<\/th><\/tr><\/thead><tbody>\"\n        + \"\".join(body)\n        + \"<\/tbody><\/table>\"\n    )"}, {"source": "agent_harness/dashboard.py", "chunk_id": 6, "text": "def render_determinism_table(rows: list[dict[str, Any]]) -> str:\n    if not rows:\n        return \"<p>No determinism results yet.<\/p>\"\n    body = []\n    for item in rows:\n        tools = \", \".join(item.get(\"tool_sequence\") or []) or \"none\"\n        body.append(\n            \"<tr>\"\n            f\"<td>{escape(str(item.get('run_number', '')))}<\/td>\"\n            f\"<td>{escape(str(item.get('status', '')))}<\/td>\"\n            f\"<td>{float(item.get('latency_seconds') or 0.0):.2f}s<\/td>\"\n            f\"<td>{escape(tools)}<\/td>\"\n            f\"<td><code>{escape(str(item.get('run_id', '')))}<\/code><\/td>\"\n            \"<\/tr>\"\n        )\n    return (\n        \"<table><thead><tr><th>Run<\/th><th>Status<\/th><th>Latency<\/th><th>Tools<\/th><th>Run ID<\/th><\/tr>\"\n        \"<\/thead><tbody>\"\n        + \"\".join(body)\n        + \"<\/tbody><\/table>\"\n    )\n\ndef percent(numerator: int, denominator: int) -> str:\n    return f\"{numerator / denominator:.1%}\" if denominator else \"n/a\"\n\ndef escape(value: str) -> str:\n    return html.escape(value, quote=True)"}, {"source": "agent_harness/determinism.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nfrom collections import Counter\nfrom dataclasses import dataclass\nfrom datetime import datetime, timezone\nimport json\nfrom pathlib import Path\nimport re\nimport time\nfrom typing import Any\n\nfrom .core import AgentConfig, AgentHarness\nfrom .eval import collect_tool_calls, collect_usage\nfrom .llm import MockLLM, SubprocessLLM\nfrom .tools import PermissionPolicy, build_default_tools\n\n@dataclass\nclass DeterminismResult:\n    run_number: int\n    run_id: str\n    status: str\n    latency_seconds: float\n    tool_sequence: list[str]\n    usage: dict[str, Any]\n    final: str\n    error: str | None = None"}, {"source": "agent_harness/determinism.py", "chunk_id": 2, "text": "def run_determinism(\n    *,\n    task: str,\n    workspace: Path,\n    runs: int,\n    llm_cmd: str | None,\n    max_steps: int,\n    llm_timeout: int,\n    allow_shell: bool,\n    output_dir: Path,\n    policy: PermissionPolicy | None = None,\n) -> tuple[Path, Path, list[DeterminismResult]]:\n    results: list[DeterminismResult] = []\n    for index in range(1, runs + 1):\n        llm = SubprocessLLM(llm_cmd, timeout=llm_timeout) if llm_cmd else MockLLM()\n        tools = build_default_tools(workspace, allow_shell=allow_shell, policy=policy)\n        harness = AgentHarness(\n            llm=llm,\n            tools=tools,\n            config=AgentConfig(workspace=workspace, max_steps=max_steps),\n        )\n        started = time.perf_counter()\n        try:\n            run = harness.run(task)\n            latency = time.perf_counter() - started\n            tool_calls = collect_tool_calls(run)\n            results.append(\n                DeterminismResult(\n                    run_number=index,\n                    run_id=run.run_id,\n                    status=run.status,\n                    latency_seconds=latency,\n                    tool_sequence=[str(call.get(\"name\")) for call in tool_calls],\n                    usage=collect_usage(run),\n                    final=run.final or \"\",\n                )\n            )\n        except Exception as exc:\n            latency = time.perf_counter() - started\n            results.append(\n                DeterminismResult(\n                    run_number=index,\n                    run_id=\"\",\n                    status=\"error\",\n                    latency_seconds="}, {"source": "agent_harness/determinism.py", "chunk_id": 3, "text": "latency,\n                    tool_sequence=[],\n                    usage={},\n                    final=\"\",\n                    error=str(exc),\n                )\n            )"}, {"source": "agent_harness/determinism.py", "chunk_id": 4, "text": "timestamp = datetime.now(timezone.utc).strftime(\"%Y%m%dT%H%M%SZ\")\n    output_dir.mkdir(parents=True, exist_ok=True)\n    results_path = output_dir / f\"determinism-{timestamp}.jsonl\"\n    report_path = output_dir / f\"determinism-{timestamp}.md\"\n    with results_path.open(\"w\", encoding=\"utf-8\") as file:\n        for result in results:\n            file.write(json.dumps(result.__dict__, ensure_ascii=False) + \"\\n\")\n    report_path.write_text(render_determinism_report(task, results), encoding=\"utf-8\")\n    return results_path, report_path, results\n\ndef render_determinism_report(task: str, results: list[DeterminismResult]) -> str:\n    total = len(results)\n    completed = sum(1 for result in results if result.status == \"completed\")\n    final_counter = Counter(normalize_text(result.final) for result in results if result.final)\n    tool_counter = Counter(tuple(result.tool_sequence) for result in results)\n    most_common_final_count = final_counter.most_common(1)[0][1] if final_counter else 0\n    most_common_tool_count = tool_counter.most_common(1)[0][1] if tool_counter else 0\n    avg_latency = sum(result.latency_seconds for result in results) / total if total else 0.0\n    total_tokens = sum(\n        int(result.usage.get(\"total_tokens\") or result.usage.get(\"prompt_tokens\", 0) + result.usage.get(\"completion_tokens\", 0))\n        for result in results\n    )"}, {"source": "agent_harness/determinism.py", "chunk_id": 5, "text": "lines = [\n        \"# Determinism Report\",\n        \"\",\n        f\"- Task: {task}\",\n        f\"- Runs: {total}\",\n        f\"- Completed: {completed}\",\n        f\"- Success consistency: {completed / total:.1%}\" if total else \"- Success consistency: n/a\",\n        f\"- Final answer consistency: {most_common_final_count / total:.1%}\" if total else \"- Final answer consistency: n/a\",\n        f\"- Tool sequence consistency: {most_common_tool_count / total:.1%}\" if total else \"- Tool sequence consistency: n/a\",\n        f\"- Average latency: {avg_latency:.2f}s\",\n        f\"- Total tokens: {total_tokens}\",\n        \"\",\n        \"## Tool Sequences\",\n        \"\",\n    ]\n    if not tool_counter:\n        lines.append(\"No tool calls recorded.\")\n    for sequence, count in tool_counter.most_common():\n        label = \", \".join(sequence) if sequence else \"none\"\n        lines.append(f\"- `{label}`: {count}\")\n\nlines.extend(\n        [\n            \"\",\n            \"## Runs\",\n            \"\",\n            \"| Run | Status | Latency | Tools | Run ID | Error |\",\n            \"| ---: | --- | ---: | --- | --- | --- |\",\n        ]\n    )\n    for result in results:\n        tools = \", \".join(result.tool_sequence) or \"none\"\n        lines.append(\n            f\"| {result.run_number} | {result.status} | {result.latency_seconds:.2f}s | \"\n            f\"{tools} | `{result.run_id}` | {result.error or ''} |\"\n        )\n    lines.append(\"\")\n    return \"\\n\".join(lines)\n\ndef normalize_text(value: str) -> str:\n    return re.sub(r\"\\s+\", \" \", value.strip().lower())"}, {"source": "agent_harness/eval.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nfrom collections import Counter\nfrom dataclasses import dataclass, field\nfrom datetime import datetime, timezone\nimport json\nfrom pathlib import Path\nimport time\nfrom typing import Any\n\nfrom .core import AgentConfig, AgentHarness, AgentRun\nfrom .llm import MockLLM, SubprocessLLM\nfrom .tools import PermissionPolicy, build_default_tools\n\n@dataclass\nclass EvalTask:\n    id: str\n    task: str\n    expect_status: str = \"completed\"\n    expect_tools: list[str] = field(default_factory=list)\n    forbid_tools: list[str] = field(default_factory=list)\n    expect_contains: list[str] = field(default_factory=list)\n    expect_observation_contains: list[str] = field(default_factory=list)\n    allow_shell: bool = False\n\n@dataclass\nclass EvalResult:\n    task_id: str\n    task: str\n    status: str\n    passed: bool\n    checks: dict[str, bool]\n    latency_seconds: float\n    tool_calls: list[dict[str, Any]]\n    usage: dict[str, Any]\n    cost_usd: float | None\n    cost_breakdown_usd: dict[str, float | None]\n    failure_category: str\n    final: str | None\n    run_id: str\n    error: str | None = None"}, {"source": "agent_harness/eval.py", "chunk_id": 2, "text": "def load_tasks(path: Path) -> list[EvalTask]:\n    tasks: list[EvalTask] = []\n    for line_number, line in enumerate(path.read_text(encoding=\"utf-8\").splitlines(), start=1):\n        stripped = line.strip()\n        if not stripped or stripped.startswith(\"#\"):\n            continue\n        data = json.loads(stripped)\n        tasks.append(\n            EvalTask(\n                id=str(data.get(\"id\") or f\"task_{line_number}\"),\n                task=str(data[\"task\"]),\n                expect_status=str(data.get(\"expect_status\", \"completed\")),\n                expect_tools=[str(item) for item in data.get(\"expect_tools\", [])],\n                forbid_tools=[str(item) for item in data.get(\"forbid_tools\", [])],\n                expect_contains=[str(item) for item in data.get(\"expect_contains\", [])],\n                expect_observation_contains=[\n                    str(item) for item in data.get(\"expect_observation_contains\", [])\n                ],\n                allow_shell=bool(data.get(\"allow_shell\", False)),\n            )\n        )\n    return tasks\n\ndef collect_tool_calls(run: AgentRun) -> list[dict[str, Any]]:\n    calls: list[dict[str, Any]] = []\n    for message in run.messages:\n        if message.get(\"role\") != \"assistant\":\n            continue\n        for call in message.get(\"tool_calls\") or []:\n            if isinstance(call, dict):\n                calls.append(call)\n    return calls"}, {"source": "agent_harness/eval.py", "chunk_id": 3, "text": "def collect_observations(run: AgentRun) -> str:\n    observations: list[str] = []\n    for message in run.messages:\n        if message.get(\"role\") == \"tool\":\n            observations.append(str(message.get(\"content\", \"\")))\n    return \"\\n\".join(observations)\n\ndef collect_usage(run: AgentRun) -> dict[str, Any]:\n    usage: dict[str, Any] = {}\n    for message in run.messages:\n        if message.get(\"role\") != \"assistant\":\n            continue\n        item = message.get(\"usage\") or {}\n        if not isinstance(item, dict):\n            continue\n        for key, value in item.items():\n            if isinstance(value, (int, float)):\n                usage[key] = usage.get(key, 0) + value\n            elif key not in usage:\n                usage[key] = value\n    return usage\n\ndef collect_model(run: AgentRun) -> str | None:\n    for message in reversed(run.messages):\n        if message.get(\"role\") == \"assistant\" and message.get(\"model\"):\n            return str(message.get(\"model\"))\n    return None\n\ndef calculate_cost_breakdown_usd(\n    model: str | None, usage: dict[str, Any], pricing: dict[str, Any]\n) -> dict[str, float | None]:\n    if not model:\n        return {\"prompt\": None, \"completion\": None, \"embedding\": 0.0, \"tool\": 0.0, \"total\": None}\n    prices = pricing.get(\"prices_per_1m_tokens\", {}).get(model)\n    if not prices:\n        return {\"prompt\": None, \"completion\": None, \"embedding\": 0.0, \"tool\": 0.0, \"total\": None}"}, {"source": "agent_harness/eval.py", "chunk_id": 4, "text": "input_tokens = usage.get(\"prompt_tokens\") or usage.get(\"input_tokens\") or 0\n    output_tokens = usage.get(\"completion_tokens\") or usage.get(\"output_tokens\") or 0\n    if not isinstance(input_tokens, (int, float)) or not isinstance(output_tokens, (int, float)):\n        return {\"prompt\": None, \"completion\": None, \"embedding\": 0.0, \"tool\": 0.0, \"total\": None}\n    prompt_cost = input_tokens * float(prices.get(\"input\", 0.0)) / 1_000_000\n    completion_cost = output_tokens * float(prices.get(\"output\", 0.0)) / 1_000_000\n    return {\n        \"prompt\": prompt_cost,\n        \"completion\": completion_cost,\n        \"embedding\": 0.0,\n        \"tool\": 0.0,\n        \"total\": prompt_cost + completion_cost,\n    }\n\ndef calculate_cost_usd(model: str | None, usage: dict[str, Any], pricing: dict[str, Any]) -> float | None:\n    return calculate_cost_breakdown_usd(model, usage, pricing).get(\"total\")\n\ndef load_pricing(path: Path | None) -> dict[str, Any]:\n    if not path or not path.exists():\n        return {\"prices_per_1m_tokens\": {}}\n    return json.loads(path.read_text(encoding=\"utf-8\"))\n\ndef classify_failure(checks: dict[str, bool], status: str, error: str | None, observations: str) -> str:\n    if all(checks.values()):\n        return \"success\""}, {"source": "agent_harness/eval.py", "chunk_id": 5, "text": "text = f\"{error or ''}\\n{observations}\".lower()\n    if \"timed out\" in text or \"timeoutexpired\" in text:\n        return \"timeout\"\n    if \"429\" in text or \"rate limit\" in text:\n        return \"rate_limit\"\n    if \"http error\" in text or \"remotedisconnected\" in text or \"request failed\" in text:\n        return \"api_error\"\n    if \"shell tool is disabled\" in text or \"path escapes workspace\" in text or \"permission\" in text:\n        return \"permission_denied\"\n    if not checks.get(\"status\", True) or status in {\"stopped\", \"max_steps_exceeded\"}:\n        return \"planning_error\"\n    if not checks.get(\"expected_tools\", True) or not checks.get(\"forbidden_tools\", True):\n        return \"planning_error\"\n    if not checks.get(\"expected_observation\", True):\n        return \"tool_error\"\n    if not checks.get(\"expected_text\", True):\n        return \"hallucination\"\n    return \"failed\"\n\ndef evaluate_run(task: EvalTask, run: AgentRun, latency_seconds: float, pricing: dict[str, Any]) -> EvalResult:\n    tool_calls = collect_tool_calls(run)\n    tool_names = [str(call.get(\"name\")) for call in tool_calls]\n    final = run.final or \"\"\n    observations = collect_observations(run)\n    usage = collect_usage(run)\n    model = collect_model(run)"}, {"source": "agent_harness/eval.py", "chunk_id": 6, "text": "checks = {\n        \"status\": run.status == task.expect_status,\n        \"expected_tools\": all(name in tool_names for name in task.expect_tools),\n        \"forbidden_tools\": all(name not in tool_names for name in task.forbid_tools),\n        \"expected_text\": all(text.lower() in final.lower() for text in task.expect_contains),\n        \"expected_observation\": all(\n            text.lower() in observations.lower() for text in task.expect_observation_contains\n        ),\n    }\n    cost_breakdown = calculate_cost_breakdown_usd(model, usage, pricing)\n    failure_category = classify_failure(checks, run.status, None, observations)\n    return EvalResult(\n        task_id=task.id,\n        task=task.task,\n        status=run.status,\n        passed=all(checks.values()),\n        checks=checks,\n        latency_seconds=latency_seconds,\n        tool_calls=tool_calls,\n        usage=usage,\n        cost_usd=cost_breakdown.get(\"total\"),\n        cost_breakdown_usd=cost_breakdown,\n        failure_category=failure_category,\n        final=run.final,\n        run_id=run.run_id,\n    )"}, {"source": "agent_harness/eval.py", "chunk_id": 7, "text": "def run_eval(\n    *,\n    tasks_path: Path,\n    workspace: Path,\n    llm_cmd: str | None,\n    max_steps: int,\n    llm_timeout: int,\n    results_dir: Path,\n    reports_dir: Path,\n    pricing_path: Path | None = None,\n    policy: PermissionPolicy | None = None,\n) -> tuple[Path, Path, list[EvalResult]]:\n    tasks = load_tasks(tasks_path)\n    pricing = load_pricing(pricing_path)\n    timestamp = datetime.now(timezone.utc).strftime(\"%Y%m%dT%H%M%SZ\")\n    results_dir.mkdir(parents=True, exist_ok=True)\n    reports_dir.mkdir(parents=True, exist_ok=True)\n    results_path = results_dir / f\"eval-{timestamp}.jsonl\"\n    report_path = reports_dir / f\"eval-{timestamp}.md\""}, {"source": "agent_harness/eval.py", "chunk_id": 8, "text": "results: list[EvalResult] = []\n    for task in tasks:\n        llm = SubprocessLLM(llm_cmd, timeout=llm_timeout) if llm_cmd else MockLLM()\n        tools = build_default_tools(workspace, allow_shell=task.allow_shell, policy=policy)\n        harness = AgentHarness(\n            llm=llm,\n            tools=tools,\n            config=AgentConfig(workspace=workspace, max_steps=max_steps),\n        )\n        started = time.perf_counter()\n        latency = time.perf_counter() - started\n        try:\n            run = harness.run(task.task)\n            latency = time.perf_counter() - started\n            results.append(evaluate_run(task, run, latency, pricing))\n        except Exception as exc:\n            latency = time.perf_counter() - started\n            results.append(\n                EvalResult(\n                    task_id=task.id,\n                    task=task.task,\n                    status=\"error\",\n                    passed=False,\n                    checks={\"status\": False, \"expected_tools\": False, \"expected_text\": False},\n                    latency_seconds=latency,\n                    tool_calls=[],\n                    usage={},\n                    cost_usd=None,\n                    cost_breakdown_usd={\n                        \"prompt\": None,\n                        \"completion\": None,\n                        \"embedding\": 0.0,\n                        \"tool\": 0.0,\n                        \"total\": None,\n                    },\n                    failure_category=classify_failure(\n                        {\"status\": False, \"expected_tools\": False, \"expected_text\": False},\n         "}, {"source": "agent_harness/eval.py", "chunk_id": 9, "text": "               \"error\",\n                        str(exc),\n                        \"\",\n                    ),\n                    final=None,\n                    run_id=\"\",\n                    error=str(exc),\n                )\n            )"}, {"source": "agent_harness/eval.py", "chunk_id": 10, "text": "with results_path.open(\"w\", encoding=\"utf-8\") as file:\n        for result in results:\n            file.write(json.dumps(result.__dict__, ensure_ascii=False) + \"\\n\")\n\nreport_path.write_text(render_report(tasks_path, results), encoding=\"utf-8\")\n    return results_path, report_path, results\n\ndef render_report(tasks_path: Path, results: list[EvalResult]) -> str:\n    total = len(results)\n    passed = sum(1 for result in results if result.passed)\n    avg_latency = sum(result.latency_seconds for result in results) / total if total else 0.0\n    total_cost = sum(result.cost_usd or 0.0 for result in results)\n    prompt_cost = sum(result.cost_breakdown_usd.get(\"prompt\") or 0.0 for result in results)\n    completion_cost = sum(result.cost_breakdown_usd.get(\"completion\") or 0.0 for result in results)\n    embedding_cost = sum(result.cost_breakdown_usd.get(\"embedding\") or 0.0 for result in results)\n    tool_cost = sum(result.cost_breakdown_usd.get(\"tool\") or 0.0 for result in results)\n    total_tokens = sum(\n        int(result.usage.get(\"total_tokens\") or result.usage.get(\"prompt_tokens\", 0) + result.usage.get(\"completion_tokens\", 0))\n        for result in results\n    )\n    categories = Counter(result.failure_category for result in results)\n    tool_accuracy = (\n        sum(1 for result in results if result.checks.get(\"expected_tools\", False)) / total\n        if total\n        else 0.0\n    )"}, {"source": "agent_harness/eval.py", "chunk_id": 11, "text": "lines = [\n        \"# Evaluation Report\",\n        \"\",\n        f\"- Tasks file: `{tasks_path}`\",\n        f\"- Total tasks: {total}\",\n        f\"- Passed: {passed}\",\n        f\"- Failed: {total - passed}\",\n        f\"- Success rate: {passed / total:.1%}\" if total else \"- Success rate: n/a\",\n        f\"- Tool accuracy: {tool_accuracy:.1%}\" if total else \"- Tool accuracy: n/a\",\n        f\"- Average latency: {avg_latency:.2f}s\",\n        f\"- Total tokens: {total_tokens}\",\n        f\"- Estimated cost: ${total_cost:.6f}\",\n        f\"- Prompt cost: ${prompt_cost:.6f}\",\n        f\"- Completion cost: ${completion_cost:.6f}\",\n        f\"- Embedding cost: ${embedding_cost:.6f}\",\n        f\"- Tool cost: ${tool_cost:.6f}\",\n        f\"- Failure categories: {format_counter(categories)}\",\n        \"\",\n        \"| Task | Status | Passed | Category | Latency | Tokens | Cost | Tools | Checks | Error |\",\n        \"| --- | --- | --- | --- | ---: | ---: | ---: | --- | --- | --- |\",\n    ]\n    for result in results:\n        tools = \", \".join(str(call.get(\"name\")) for call in result.tool_calls) or \"none\"\n        tokens = result.usage.get(\"total_tokens\") or (\n            result.usage.get(\"prompt_tokens\", 0) + result.usage.get(\"completion_tokens\", 0)\n        )\n        cost = f\"${result.cost_usd:.6f}\" if result.cost_usd is not None else \"n/a\"\n        checks = \", \".join(\n            f\"{name}={'pass' if value else 'fail'}\" for name, value in result.checks.items()\n        )\n        lines.append(\n            f\"| `{result.task_id}` | {result.status} | {'yes' if result.passed else 'no'} | \"\n            f\"{result.failure_categ"}, {"source": "agent_harness/eval.py", "chunk_id": 12, "text": "ory} | \"\n            f\"{result.latency_seconds:.2f}s | {tokens} | {cost} | {tools} | {checks} | {result.error or ''} |\"\n        )"}, {"source": "agent_harness/eval.py", "chunk_id": 13, "text": "lines.extend([\"\", \"## Failed Tasks\", \"\"])\n    failed = [result for result in results if not result.passed]\n    if not failed:\n        lines.append(\"No failed tasks.\")\n    for result in failed:\n        lines.extend(\n            [\n                f\"### {result.task_id}\",\n                \"\",\n                f\"- Status: {result.status}\",\n                f\"- Failure category: {result.failure_category}\",\n                f\"- Run ID: `{result.run_id}`\",\n                f\"- Checks: `{json.dumps(result.checks, ensure_ascii=False)}`\",\n                f\"- Cost breakdown: `{json.dumps(result.cost_breakdown_usd, ensure_ascii=False)}`\",\n                f\"- Error: {result.error or ''}\",\n                f\"- Final: {result.final or ''}\",\n                \"\",\n            ]\n        )\n    lines.append(\"\")\n    return \"\\n\".join(lines)\n\ndef format_counter(counter: Counter[str]) -> str:\n    if not counter:\n        return \"none\"\n    return \", \".join(f\"{name}={count}\" for name, count in sorted(counter.items()))"}, {"source": "agent_harness/llm.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nimport json\nimport subprocess\nfrom typing import Any\n\nclass MockLLM:\n    \"\"\"A deterministic LLM stub for proving the harness loop works.\"\"\"\n\ndef complete(self, payload: dict[str, Any]) -> dict[str, Any]:\n        tool_messages = [message for message in payload[\"messages\"] if message.get(\"role\") == \"tool\"]\n        if not tool_messages:\n            return {\n                \"thought\": \"I should inspect the workspace before answering.\",\n                \"tool_calls\": [{\"name\": \"list_dir\", \"arguments\": {\"path\": \".\"}}],\n                \"final\": None,\n            }\n        return {\n            \"thought\": \"I have a tool observation and can summarize it.\",\n            \"tool_calls\": [],\n            \"final\": f\"Mock run completed. Last observation: {tool_messages[-1]['content']}\",\n        }\n\nclass SubprocessLLM:\n    \"\"\"Run an external LLM adapter that speaks the harness JSON protocol.\"\"\"\n\ndef __init__(self, command: str, timeout: int = 120):\n        self.command = command\n        self.timeout = timeout"}, {"source": "agent_harness/llm.py", "chunk_id": 2, "text": "def complete(self, payload: dict[str, Any]) -> dict[str, Any]:\n        completed = subprocess.run(\n            self.command,\n            input=json.dumps(payload, ensure_ascii=False),\n            shell=True,\n            text=True,\n            capture_output=True,\n            timeout=self.timeout,\n        )\n        if completed.returncode != 0:\n            raise RuntimeError(f\"LLM command failed: {completed.stderr.strip()}\")\n        try:\n            response = json.loads(completed.stdout)\n        except json.JSONDecodeError as exc:\n            raise RuntimeError(f\"LLM command returned invalid JSON: {completed.stdout[:1000]}\") from exc\n        if not isinstance(response, dict):\n            raise RuntimeError(\"LLM command must return a JSON object\")\n        return response"}, {"source": "agent_harness/rag.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nfrom collections import Counter\nfrom dataclasses import dataclass\nimport json\nfrom pathlib import Path\nimport re\nfrom typing import Any\n\nDEFAULT_EXTENSIONS = {\".md\", \".txt\", \".py\", \".json\", \".jsonl\", \".toml\", \".yaml\", \".yml\"}\nSKIP_PARTS = {\"__pycache__\", \".git\", \"runs\", \"dashboard\", \"rag\", \"results\", \"reports\", \"determinism\"}\nSTOPWORDS = {\n    \"a\",\n    \"an\",\n    \"and\",\n    \"are\",\n    \"do\",\n    \"for\",\n    \"how\",\n    \"i\",\n    \"in\",\n    \"is\",\n    \"it\",\n    \"of\",\n    \"on\",\n    \"or\",\n    \"the\",\n    \"to\",\n    \"with\",\n}\n\n@dataclass\nclass Chunk:\n    source: str\n    chunk_id: int\n    text: str\n\ndef build_rag_index(\n    workspace: Path,\n    inputs: list[str],\n    output: Path,\n    chunk_chars: int = 1600,\n) -> Path:\n    chunks: list[Chunk] = []\n    for file_path in discover_files(workspace, inputs):\n        text = file_path.read_text(encoding=\"utf-8\", errors=\"replace\")\n        text = remove_rag_query_examples(text)\n        relative = str(file_path.relative_to(workspace))\n        for index, chunk_text in enumerate(split_text(text, chunk_chars=chunk_chars), start=1):\n            chunks.append(Chunk(source=relative, chunk_id=index, text=chunk_text))\n\noutput.parent.mkdir(parents=True, exist_ok=True)\n    output.write_text(\n        json.dumps(\n            {\n                \"workspace\": str(workspace),\n                \"chunk_count\": len(chunks),\n                \"chunks\": [chunk.__dict__ for chunk in chunks],\n            },\n            indent=2,\n            ensure_ascii=False,\n        )\n        + \"\\n\",\n        encoding=\"utf-8\",\n    )\n    return output"}, {"source": "agent_harness/rag.py", "chunk_id": 2, "text": "def query_rag_index(index_path: Path, question: str, top_k: int = 5) -> str:\n    data = json.loads(index_path.read_text(encoding=\"utf-8\"))\n    chunks = [Chunk(**item) for item in data.get(\"chunks\", [])]\n    ranked = rank_chunks(chunks, question)[:top_k]\n\nlines = [\n        \"# RAG Answer\",\n        \"\",\n        f\"Question: {question}\",\n        \"\",\n    ]\n    if not ranked:\n        lines.append(\"No relevant chunks were found.\")\n        return \"\\n\".join(lines)\n\nlines.extend([\"## Answer\", \"\"])\n    lines.append(build_extractive_answer(ranked, question))\n    lines.extend([\"\", \"## Citations\", \"\"])\n    for score, chunk in ranked:\n        snippet = summarize_chunk(chunk.text, question)\n        lines.extend(\n            [\n                f\"### [{chunk.source}#chunk-{chunk.chunk_id}]\",\n                \"\",\n                f\"- Score: {score:.2f}\",\n                \"\",\n                \"```text\",\n                snippet,\n                \"```\",\n                \"\",\n            ]\n        )\n    return \"\\n\".join(lines)"}, {"source": "agent_harness/rag.py", "chunk_id": 3, "text": "def discover_files(workspace: Path, inputs: list[str]) -> list[Path]:\n    files: list[Path] = []\n    for item in inputs or [\".\"]:\n        path = (workspace / item).resolve()\n        if workspace != path and workspace not in path.parents:\n            raise ValueError(f\"Path escapes workspace: {item}\")\n        if path.is_file() and path.suffix.lower() in DEFAULT_EXTENSIONS:\n            files.append(path)\n        elif path.is_dir():\n            for child in path.rglob(\"*\"):\n                if child.is_file() and child.suffix.lower() in DEFAULT_EXTENSIONS:\n                    if not SKIP_PARTS.intersection(child.relative_to(workspace).parts):\n                        files.append(child)\n    return sorted(set(files))\n\ndef split_text(text: str, chunk_chars: int) -> list[str]:\n    paragraphs = [part.strip() for part in re.split(r\"\\n\\s*\\n\", text) if part.strip()]\n    chunks: list[str] = []\n    current: list[str] = []\n    current_len = 0\n    for paragraph in paragraphs:\n        if current and current_len + len(paragraph) + 2 > chunk_chars:\n            chunks.append(\"\\n\\n\".join(current))\n            current = []\n            current_len = 0\n        if len(paragraph) > chunk_chars:\n            chunks.extend(paragraph[i : i + chunk_chars] for i in range(0, len(paragraph), chunk_chars))\n            continue\n        current.append(paragraph)\n        current_len += len(paragraph) + 2\n    if current:\n        chunks.append(\"\\n\\n\".join(current))\n    return chunks"}, {"source": "agent_harness/rag.py", "chunk_id": 4, "text": "def rank_chunks(chunks: list[Chunk], question: str) -> list[tuple[float, Chunk]]:\n    query_terms = tokenize(question)\n    if not query_terms:\n        return []\n    query_counts = Counter(query_terms)\n    scored: list[tuple[float, Chunk]] = []\n    for chunk in chunks:\n        terms = tokenize(chunk.text)\n        counts = Counter(terms)\n        overlap = sum(min(counts[term], query_counts[term]) for term in query_counts)\n        if overlap == 0:\n            continue\n        score = overlap / max(len(query_terms), 1)\n        score += keyword_boost(chunk, question)\n        scored.append((score, chunk))\n    return sorted(scored, key=lambda item: item[0], reverse=True)\n\ndef summarize_chunk(text: str, question: str, limit: int = 1500) -> str:\n    command_block = extract_relevant_command_block(text, question)\n    if command_block:\n        return command_block[:limit]\n    terms = set(tokenize(question))\n    sentences = re.split(r\"(?<=[.!?])\\s+|\\n\", text)\n    selected = [sentence.strip() for sentence in sentences if terms.intersection(tokenize(sentence))]\n    snippet = \"\\n\".join(selected[:20]) if selected else text[:limit]\n    return snippet[:limit]\n\ndef build_extractive_answer(ranked: list[tuple[float, Chunk]], question: str) -> str:\n    snippets = []\n    preferred = [item for item in ranked if not item[1].source.endswith(\".py\")]\n    selected = preferred[:3] or ranked[:3]\n    for _, chunk in selected:\n        snippet = summarize_chunk(chunk.text, question, limit=350)\n        snippets.append(f\"{snippet} [{chunk.source}#chunk-{chunk.chunk_id}]\")\n    return \"\\n\\n\".join(snippets)"}, {"source": "agent_harness/rag.py", "chunk_id": 5, "text": "def tokenize(value: str) -> list[str]:\n    return [\n        item.lower()\n        for item in re.findall(r\"[A-Za-z0-9_]+\", value)\n        if item.lower() not in STOPWORDS\n    ]\n\ndef keyword_boost(chunk: Chunk, question: str) -> float:\n    haystack = chunk.text.lower()\n    query = question.lower()\n    score = 0.0\n    if chunk.source.endswith(\".py\"):\n        score -= 0.5\n    if chunk.source.lower() in {\"readme.md\", \"evals/readme.md\"}:\n        score += 0.25\n    if \"deepseek\" in query and \"deepseek\" in haystack:\n        score += 0.25\n    if \"evaluation\" in query or \"benchmark\" in query:\n        if \"eval --tasks\" in haystack:\n            score += 0.45\n        if \"evals/tasks.jsonl\" in haystack:\n            score += 0.35\n        if \"evaluation benchmark\" in haystack:\n            score += 0.25\n    return score\n\ndef remove_rag_query_examples(text: str) -> str:\n    cleaned_blocks: list[str] = []\n    position = 0\n    for match in re.finditer(r\"```.*?```\", text, flags=re.DOTALL):\n        cleaned_blocks.append(text[position : match.start()])\n        block = match.group(0)\n        if \"rag-query\" not in block:\n            cleaned_blocks.append(block)\n        position = match.end()\n    cleaned_blocks.append(text[position:])\n    return \"\".join(cleaned_blocks)"}, {"source": "agent_harness/rag.py", "chunk_id": 6, "text": "def extract_relevant_command_block(text: str, question: str) -> str | None:\n    query_terms = set(tokenize(question))\n    blocks = re.findall(r\"```(?:bash|sh|text)?\\n(.*?)```\", text, flags=re.DOTALL)\n    best: tuple[int, str] | None = None\n    for block in blocks:\n        if \"rag-query\" in block:\n            continue\n        block_terms = set(tokenize(block))\n        score = len(query_terms.intersection(block_terms))\n        if \"eval --tasks\" in block:\n            score += 5\n        if \"providers.deepseek\" in block:\n            score += 3\n        if score <= 0:\n            continue\n        if best is None or score > best[0]:\n            best = (score, block.strip())\n    return best[1] if best else None"}, {"source": "agent_harness/tools.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nfrom dataclasses import dataclass\nimport json\nfrom pathlib import Path\nimport shlex\nimport subprocess\nfrom typing import Any, Callable\n\nToolFn = Callable[[dict[str, Any]], Any]\n\n@dataclass\nclass Tool:\n    name: str\n    description: str\n    parameters: dict[str, Any]\n    fn: ToolFn\n\nclass ToolRegistry:\n    def __init__(self, workspace: Path):\n        self.workspace = workspace.resolve()\n        self._tools: dict[str, Tool] = {}\n\ndef register(self, tool: Tool) -> None:\n        self._tools[tool.name] = tool\n\ndef schemas(self) -> list[dict[str, Any]]:\n        return [\n            {\n                \"name\": tool.name,\n                \"description\": tool.description,\n                \"parameters\": tool.parameters,\n            }\n            for tool in self._tools.values()\n        ]\n\ndef call(self, name: str | None, arguments: dict[str, Any]) -> str:\n        if not name or name not in self._tools:\n            return json.dumps({\"ok\": False, \"error\": f\"Unknown tool: {name}\"}, ensure_ascii=False)\n        try:\n            result = self._tools[name].fn(arguments)\n            return json.dumps({\"ok\": True, \"result\": result}, ensure_ascii=False)\n        except Exception as exc:\n            return json.dumps({\"ok\": False, \"error\": str(exc)}, ensure_ascii=False)"}, {"source": "agent_harness/tools.py", "chunk_id": 2, "text": "def resolve_path(self, value: str | None) -> Path:\n        raw = Path(value or \".\")\n        path = raw if raw.is_absolute() else self.workspace / raw\n        resolved = path.resolve()\n        if self.workspace != resolved and self.workspace not in resolved.parents:\n            raise ValueError(f\"Path escapes workspace: {value}\")\n        return resolved\n\n@dataclass\nclass PermissionPolicy:\n    read_only: bool = False\n    shell_allowlist: list[str] | None = None\n    deny_dangerous_shell: bool = True\n    max_write_bytes: int = 1_000_000\n\ndef build_default_tools(\n    workspace: Path,\n    allow_shell: bool,\n    policy: PermissionPolicy | None = None,\n) -> ToolRegistry:\n    registry = ToolRegistry(workspace)\n    policy = policy or PermissionPolicy()\n\ndef list_dir(args: dict[str, Any]) -> list[str]:\n        path = registry.resolve_path(args.get(\"path\"))\n        if not path.is_dir():\n            raise ValueError(f\"Not a directory: {path}\")\n        return sorted(child.name + (\"/\" if child.is_dir() else \"\") for child in path.iterdir())\n\ndef read_file(args: dict[str, Any]) -> str:\n        path = registry.resolve_path(args.get(\"path\"))\n        limit = int(args.get(\"limit\", 20000))\n        return path.read_text(encoding=\"utf-8\", errors=\"replace\")[:limit]"}, {"source": "agent_harness/tools.py", "chunk_id": 3, "text": "def write_file(args: dict[str, Any]) -> dict[str, Any]:\n        if policy.read_only:\n            raise PermissionError(\"write_file is disabled by the active read-only permission policy.\")\n        path = registry.resolve_path(args.get(\"path\"))\n        content = str(args.get(\"content\", \"\"))\n        byte_count = len(content.encode(\"utf-8\"))\n        if byte_count > policy.max_write_bytes:\n            raise PermissionError(\n                f\"write_file payload is {byte_count} bytes, above the {policy.max_write_bytes} byte limit.\"\n            )\n        path.parent.mkdir(parents=True, exist_ok=True)\n        path.write_text(content, encoding=\"utf-8\")\n        return {\"path\": str(path), \"bytes\": byte_count}\n\ndef run_shell(args: dict[str, Any]) -> dict[str, Any]:\n        if not allow_shell:\n            raise PermissionError(\"Shell tool is disabled. Re-run with --allow-shell to enable it.\")\n        command = str(args.get(\"command\", \"\"))\n        validate_shell_command(command, policy)\n        timeout = int(args.get(\"timeout\", 20))\n        completed = subprocess.run(\n            command,\n            cwd=registry.workspace,\n            shell=True,\n            text=True,\n            capture_output=True,\n            timeout=timeout,\n        )\n        return {\n            \"returncode\": completed.returncode,\n            \"stdout\": completed.stdout[-20000:],\n            \"stderr\": completed.stderr[-20000:],\n        }"}, {"source": "agent_harness/tools.py", "chunk_id": 4, "text": "registry.register(\n        Tool(\n            \"list_dir\",\n            \"List files and directories under a workspace-relative path.\",\n            {\n                \"type\": \"object\",\n                \"properties\": {\"path\": {\"type\": \"string\"}},\n                \"required\": [\"path\"],\n            },\n            list_dir,\n        )\n    )\n    registry.register(\n        Tool(\n            \"read_file\",\n            \"Read a UTF-8 text file under the workspace.\",\n            {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"path\": {\"type\": \"string\"},\n                    \"limit\": {\"type\": \"integer\", \"default\": 20000},\n                },\n                \"required\": [\"path\"],\n            },\n            read_file,\n        )\n    )\n    registry.register(\n        Tool(\n            \"write_file\",\n            \"Write a UTF-8 text file under the workspace.\",\n            {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"path\": {\"type\": \"string\"},\n                    \"content\": {\"type\": \"string\"},\n                },\n                \"required\": [\"path\", \"content\"],\n            },\n            write_file,\n        )\n    )\n    registry.register(\n        Tool(\n            \"run_shell\",\n            \"Run a shell command in the workspace. Disabled unless the harness is started with --allow-shell.\",\n            {\n                \"type\": \"object\",\n                \"properties\": {\n                    \"command\": {\"type\": \"string\"},\n                    \"timeout\": {\"type\": \"integer\", \"default\": 20},\n                },\n                \"required"}, {"source": "agent_harness/tools.py", "chunk_id": 5, "text": "\": [\"command\"],\n            },\n            run_shell,\n        )\n    )\n    return registry"}, {"source": "agent_harness/tools.py", "chunk_id": 6, "text": "def validate_shell_command(command: str, policy: PermissionPolicy) -> None:\n    if not command.strip():\n        raise PermissionError(\"Empty shell command is not allowed.\")\n    try:\n        parts = shlex.split(command)\n    except ValueError as exc:\n        raise PermissionError(f\"Invalid shell command: {exc}\") from exc\n    if not parts:\n        raise PermissionError(\"Empty shell command is not allowed.\")\n\nif policy.shell_allowlist is not None:\n        allowed = {item.strip() for item in policy.shell_allowlist if item.strip()}\n        if parts[0] not in allowed:\n            raise PermissionError(\n                f\"Shell command '{parts[0]}' is not in the allowlist: {sorted(allowed)}\"\n            )\n\nif policy.deny_dangerous_shell:\n        normalized = \" \".join(parts).lower()\n        dangerous_patterns = [\n            \"rm -rf /\",\n            \"sudo \",\n            \"mkfs\",\n            \"diskutil erase\",\n            \":(){\",\n            \"chmod -r 777 /\",\n            \"chown -r\",\n            \"curl \",\n            \"wget \",\n        ]\n        for pattern in dangerous_patterns:\n            if pattern in normalized:\n                raise PermissionError(f\"Shell command blocked by safety policy: {pattern.strip()}\")"}, {"source": "agent_harness/trace.py", "chunk_id": 1, "text": "from __future__ import annotations\n\nimport json\nfrom pathlib import Path\nfrom typing import Any\n\ndef load_transcript(workspace: Path, run_id: str | None = None, transcript: Path | None = None) -> dict[str, Any]:\n    path = resolve_transcript_path(workspace, run_id, transcript)\n    return json.loads(path.read_text(encoding=\"utf-8\"))\n\ndef resolve_transcript_path(workspace: Path, run_id: str | None = None, transcript: Path | None = None) -> Path:\n    if transcript:\n        return transcript.resolve()\n    if not run_id:\n        raise ValueError(\"Either run_id or transcript must be provided.\")\n    return (workspace / \"runs\" / f\"{run_id}.json\").resolve()\n\ndef render_trace_markdown(transcript: dict[str, Any]) -> str:\n    messages = transcript.get(\"messages\", [])\n    lines = [\n        \"# Agent Trace\",\n        \"\",\n        f\"- Run ID: `{transcript.get('run_id', '')}`\",\n        f\"- Status: {transcript.get('status', '')}\",\n        f\"- Task: {transcript.get('task', '')}\",\n        \"\",\n        \"## Flow\",\n        \"\",\n        \"```mermaid\",\n        \"flowchart TD\",\n        '  start[\"User task\"]',\n    ]"}, {"source": "agent_harness/trace.py", "chunk_id": 2, "text": "node_index = 0\n    previous = \"start\"\n    for message in messages:\n        role = message.get(\"role\")\n        if role not in {\"assistant\", \"tool\"}:\n            continue\n        node_index += 1\n        node_id = f\"n{node_index}\"\n        if role == \"assistant\":\n            label = \"LLM\"\n            if message.get(\"tool_calls\"):\n                tool_names = \", \".join(str(call.get(\"name\")) for call in message.get(\"tool_calls\", []))\n                label = f\"LLM: {tool_names}\"\n            elif message.get(\"final\"):\n                label = \"LLM: final answer\"\n        else:\n            label = f\"Observation: {message.get('name', 'tool')}\"\n        lines.append(f'  {node_id}[\"{escape_mermaid(label)}\"]')\n        lines.append(f\"  {previous} --> {node_id}\")\n        previous = node_id\n    lines.extend([\"```\", \"\", \"## Steps\", \"\"])"}, {"source": "agent_harness/trace.py", "chunk_id": 3, "text": "for message in messages:\n        role = message.get(\"role\")\n        if role == \"system\":\n            continue\n        if role == \"user\":\n            lines.extend([\"### User\", \"\", message.get(\"content\", \"\"), \"\"])\n        elif role == \"assistant\":\n            lines.extend([f\"### LLM Step {message.get('step', '')}\", \"\"])\n            if message.get(\"provider\") or message.get(\"model\"):\n                lines.append(\n                    f\"- Provider: {message.get('provider') or 'unknown'}\"\n                    f\" / Model: {message.get('model') or 'unknown'}\"\n                )\n            if message.get(\"usage\"):\n                lines.append(f\"- Usage: `{json.dumps(message.get('usage'), ensure_ascii=False)}`\")\n            if message.get(\"thought\"):\n                lines.extend([\"\", \"**Thought**\", \"\", str(message.get(\"thought\")), \"\"])\n            tool_calls = message.get(\"tool_calls\") or []\n            if tool_calls:\n                lines.extend([\"**Tool Calls**\", \"\"])\n                for call in tool_calls:\n                    lines.append(\n                        f\"- `{call.get('name')}` with `{json.dumps(call.get('arguments') or {}, ensure_ascii=False)}`\"\n                    )\n                lines.append(\"\")\n            if message.get(\"final\"):\n                lines.extend([\"**Final Answer**\", \"\", str(message.get(\"final\")), \"\"])\n        elif role == \"tool\":\n            lines.extend(\n                [\n                    f\"### Tool Observation: {message.get('name', '')}\",\n                    \"\",\n                    f\"- Arguments: `{json.dumps(message.get('arguments') or {}, ensure"}, {"source": "agent_harness/trace.py", "chunk_id": 4, "text": "_ascii=False)}`\",\n                    \"\",\n                    \"```text\",\n                    truncate(str(message.get(\"content\", \"\"))),\n                    \"```\",\n                    \"\",\n                ]\n            )"}, {"source": "agent_harness/trace.py", "chunk_id": 5, "text": "return \"\\n\".join(lines)\n\ndef write_trace_markdown(\n    workspace: Path,\n    run_id: str | None = None,\n    transcript: Path | None = None,\n    output: Path | None = None,\n) -> Path:\n    transcript_path = resolve_transcript_path(workspace, run_id, transcript)\n    data = json.loads(transcript_path.read_text(encoding=\"utf-8\"))\n    output_path = output or transcript_path.with_suffix(\".trace.md\")\n    output_path.parent.mkdir(parents=True, exist_ok=True)\n    output_path.write_text(render_trace_markdown(data), encoding=\"utf-8\")\n    return output_path\n\ndef replay_transcript(transcript: dict[str, Any]) -> str:\n    lines = [\n        f\"run_id: {transcript.get('run_id', '')}\",\n        f\"status: {transcript.get('status', '')}\",\n        f\"task: {transcript.get('task', '')}\",\n        \"\",\n    ]\n    for message in transcript.get(\"messages\", []):\n        role = message.get(\"role\")\n        if role == \"assistant\":\n            lines.append(f\"LLM step {message.get('step', '')}\")\n            for call in message.get(\"tool_calls\") or []:\n                lines.append(f\"  tool_call: {call.get('name')} {json.dumps(call.get('arguments') or {})}\")\n            if message.get(\"final\"):\n                lines.append(f\"  final: {message.get('final')}\")\n        elif role == \"tool\":\n            lines.append(f\"observation: {message.get('name')}\")\n            lines.append(f\"  {truncate(str(message.get('content', '')), limit=500)}\")\n    return \"\\n\".join(lines)\n\ndef escape_mermaid(value: str) ess`\n- `planning_error`\n- `tool_error`\n- `timeout`\n- `hallucination`\n- `permission_denied`\n- `api_error`\n- `rate_limit`\n- `failed`\n\nThe Markdown report summarizes category counts and shows each task category in the main table.\n\n## Trace and Replay\n\nRender a transcript as a Markdown trace:\n\n```bash\npython3 -m agent_harness.cli trace --run-id RUN_ID\n```\n\nReplay a transcript in the terminal:\n\n```bash\npython3 -m agent_harness.cli replay --run-id RUN_ID\n```\n\n## Determinism\n\nRun one task repeatedly and measure stability:\n\n```bash\npython3 -m agent_harness.cli determinism \\\n  --task \"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\" \\\n  --runs 20 \\\n  --llm-timeout 300 \\\n  --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nThe determinism report includes success consistency, final answer consistency, tool sequence consistency, latency, token usage, and run IDs for replay.\n\n## Permission Controls\n\nRun the agent in read-only mode:\n\n```bash\npython3 -m agent_harness.cli \"Inspect the project.\" --read-only --llm-cmd \"python3 -m providers.deepseek\"\n```\n\nRestrict shell execution to specific executables:\n\n```bash\npython3 -m agent_harness.cli \"Run pwd.\" \\\n  --allow-shell \\\n  --shell-allow pwd \\\n  --llm-cmd \"python3 -m providers.deepseek\"\n```\n\n## Dashboard\n\nGenerate a static HTML dashboard:\n\n```bash\npython3 -m agent_harness.cli dashboard\n```\n\nThe output is `dashboard/index.html`.\n\n## Local RAG\n\nBuild an index:\n\n```bash\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\n```\n\nQuery it with citations:"}, {"source": "evals/echo-smoke.jsonl", "chunk_id": 1, "text": "{\"id\":\"echo_list_workspace\",\"task\":\"List files in the workspace.\",\"expect_status\":\"completed\",\"expect_tools\":[\"list_dir\"],\"expect_contains\":[\"README.md\",\"providers/\"],\"allow_shell\":false}"}, {"source": "evals/pricing.json", "chunk_id": 1, "text": "{\n  \"default_currency\": \"USD\",\n  \"prices_per_1m_tokens\": {\n    \"deepseek-v4-flash\": {\n      \"input\": 0.14,\n      \"output\": 0.28\n    },\n    \"deepseek-v4-pro\": {\n      \"input\": 1.74,\n      \"output\": 3.48\n    }\n  }\n}"}, {"source": "evals/tasks.jsonl", "chunk_id": 1, "text": "{\"id\":\"list_workspace\",\"task\":\"List files in the workspace.\",\"expect_status\":\"completed\",\"expect_tools\":[\"list_dir\"],\"expect_contains\":[\"README.md\",\"providers/\"],\"allow_shell\":false}\n{\"id\":\"list_providers\",\"task\":\"List the files inside the providers directory and mention the DeepSeek adapter.\",\"expect_status\":\"completed\",\"expect_tools\":[\"list_dir\"],\"expect_contains\":[\"deepseek.py\"],\"allow_shell\":false}\n{\"id\":\"read_readme_summary\",\"task\":\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\",\"expect_status\":\"completed\",\"expect_tools\":[\"read_file\"],\"expect_contains\":[\"provider\",\"tool\"],\"allow_shell\":false}\n{\"id\":\"read_pricing_config\",\"task\":\"Read evals/pricing.json and explain what it is used for in one sentence.\",\"expect_status\":\"completed\",\"expect_tools\":[\"read_file\"],\"expect_contains\":[\"cost\"],\"allow_shell\":false}\n{\"id\":\"write_eval_note\",\"task\":\"Create a file named notes/eval-write-test.md with the exact content: eval write test\",\"expect_status\":\"completed\",\"expect_tools\":[\"write_file\"],\"expect_contains\":[\"eval-write-test.md\"],\"allow_shell\":false}\n{\"id\":\"write_nested_note\",\"task\":\"Create a file named notes/nested/agent-note.md with the exact content: nested write ok. Do not use shell; write_file can create parent directories.\",\"expect_status\":\"completed\",\"expect_tools\":[\"write_file\"],\"forbid_tools\":[\"run_shell\"],\"expect_contains\":[\"agent-note.md\"],\"allow_shell\":false}\n{\"id\":\"path_escape_blocked\",\"task\":\"Try to read ../README.md, then explain whether the harness allowed it.\",\"expect_status\"
