<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Agent Harness Dashboard</title>
  <style>
    :root {
      --bg: #f4f6f7;
      --panel: #ffffff;
      --line: #dce3e6;
      --line-soft: #edf1f3;
      --text: #172026;
      --muted: #60707a;
      --teal: #0f766e;
      --blue: #2f5d9f;
      --amber: #a15c00;
      --red: #b42318;
      --green-bg: #e8f6ef;
      --green: #0f6b3f;
      --red-bg: #fae8e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    .app { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; }
    aside {
      background: #ffffff;
      border-right: 1px solid var(--line);
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    main { min-width: 0; }
    .brand { font-size: 18px; font-weight: 760; margin: 4px 0 2px; }
    .workspace {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      line-height: 1.35;
      margin-bottom: 18px;
    }
    .nav { display: grid; gap: 6px; }
    .nav button, .small-button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 7px;
      min-height: 36px;
      padding: 8px 10px;
      text-align: left;
      font: inherit;
      cursor: pointer;
    }
    .nav button:hover, .small-button:hover { background: #f0f4f5; }
    .nav button.active { background: #e7f2f1; border-color: #b7d5d1; color: #0b554f; font-weight: 650; }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    h1 { margin: 0; font-size: 22px; }
    h2 { margin: 0 0 12px; font-size: 17px; }
    h3 { margin: 0 0 8px; font-size: 15px; }
    .page { padding: 20px 28px 34px; }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric { padding: 14px; }
    .metric-label { color: var(--muted); font-size: 12px; }
    .metric-value { margin-top: 5px; font-size: 24px; font-weight: 760; }
    .grid-2 { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr); gap: 14px; }
    .panel { overflow: hidden; }
    .panel-head { padding: 14px 16px; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .panel-body { padding: 14px 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--line-soft); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 650; background: #fafbfb; }
    tr.selectable { cursor: pointer; }
    tr.selectable:hover { background: #f7fafb; }
    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    code { background: #eef2f4; border-radius: 4px; padding: 2px 4px; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.5;
      max-height: 260px;
      overflow: auto;
    }
    .pill { display: inline-flex; align-items: center; border-radius: 999px; padding: 3px 8px; font-size: 12px; font-weight: 650; }
    .pass { background: var(--green-bg); color: var(--green); }
    .fail { background: var(--red-bg); color: var(--red); }
    .neutral { background: #eef2f4; color: #44535b; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs button { text-align: center; }
    .timeline { display: grid; gap: 10px; }
    .step { border-left: 3px solid #b7d5d1; background: #fbfcfc; padding: 10px 12px; border-radius: 0 7px 7px 0; }
    .step.tool { border-left-color: #d7a44a; }
    .search { width: 100%; min-height: 40px; border: 1px solid var(--line); border-radius: 7px; padding: 9px 10px; font: inherit; }
    .muted { color: var(--muted); }
    .empty { color: var(--muted); padding: 22px; text-align: center; }
    .summary-line { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .health {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) repeat(3, minmax(130px, 180px));
      gap: 12px;
      margin-bottom: 16px;
    }
    .health-main { padding: 16px; background: #ffffff; border: 1px solid var(--line); border-radius: 8px; }
    .health-title { font-size: 18px; font-weight: 760; margin-bottom: 6px; }
    .health-copy { color: var(--muted); line-height: 1.45; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .toolbar input, .toolbar select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 7px 9px;
      font: inherit;
      background: #ffffff;
    }
    .toolbar input { min-width: 220px; flex: 1; }
    .chart-list { display: grid; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: minmax(110px, 180px) 1fr auto; gap: 10px; align-items: center; }
    .bar-track { height: 10px; background: #edf1f3; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--teal); border-radius: 999px; min-width: 2px; }
    .bar-fill.cost { background: var(--amber); }
    .bar-fill.tokens { background: var(--blue); }
    .bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; }
    .bar-value { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; border-right: 0; border-bottom: 1px solid var(--line); }
      .nav { grid-template-columns: repeat(3, 1fr); }
      .metrics { grid-template-columns: repeat(2, minmax(150px, 1fr)); }
      .grid-2 { grid-template-columns: 1fr; }
      .health { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 620px) {
      header, .page { padding-left: 14px; padding-right: 14px; }
      .metrics { grid-template-columns: 1fr; }
      .nav { grid-template-columns: 1fr 1fr; }
      .health { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; gap: 5px; }
      table { font-size: 12px; }
      th, td { padding: 8px 7px; }
    }
  </style>
</head>

penAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Next Extensions\\n\\n- Add stricter permission policies such as read-only mode, command allowlists, or path sandboxes\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n\"}"}, {"role": "assistant", "step": 2, "thought": "READme con ss/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | ace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n`` AI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Next Extensions\\n\\n- Add stricter permission policies such as read-only mode, command allowlists, or path sandboxes\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n\"}"}, {"role": "assistant", "step": 2, "thought": "The README.md swer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is port DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n ant", "step": 2, "thought": "Read key files to understand the project structure and purpose.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md"}}, {"name": "read_file", "arguments": {"path": "pyproject.toml"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 926, "completion_tokens": 162, "total_tokens": 1088, "prompt_tokens_details": {"cached_tokens": 256}, "completion_tokens_details": {"reasoning_tokens": 71}, "prompt_cache_hit_tokens": 256, "prompt_cache_miss_tokens": 670}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md"}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "tool", "name": "read_file", "arguments": {"path": "pyproject.toml"}, "content": "{\"ok\": true, \"result\": \"[project]\\nname = \\\"llm-agent-harness\\\"\\nversion = \\\"0.1.0\\\"\\ndescription = \\\"A small, model-agnostic harness for running and testing LLM agents with tools.\\\"\\nrequires-python = \\\">=3.10\\\"\\ndependencies = []\\n\\n[project.scripts]\\nagent-harness = \\\"agent_harness.cli:main\\\"\\n\\n[tool.pytest.ini_options]\\npythonpath = [\\\".\\\"]\\n\"}"}, {"role": "assistant", "step": 3, "thought": "Read README.md and pyproject.toml, which provide comprehensive project overview. No further tool calls needed.", "tool_calls": [], "final": "The project is a lightweight, locally runnable, model-agnostic harness for LLM a ting LLM agents with an agent loop, tool registry, and provider adapters (OpenAI, Anthropic, Gemini, DeepSeek, etc.).\n- **Evaluation & Reporting**: Includes an eval runner that checks final status, tool calls, text, latency, token usage, cost, and failure categories; generates JSONL results, Markdown reports, and per-run transcripts.\n- **Trace, Replay & Determinism**: Supports rendering run transcripts as Markdown traces with Mermaid flowcharts, replaying saved runs, and measuring consistency across multiple runs.\n- **Security & Permissions**: Offers read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits; shell execution is disabled by default.\n- **Additional Features**: Static HTML dashboard generation, local lexical RAG for document QA without embeddings, and planned extensions for Web UI, concurrent execution, and embedding-backed RAG.", "messages": [{"role": "system", "content": "You are an agent running in a harness. Use tools when useful. Return a final answer once the task is complete."}, {"role": "user", "content": "Use the read_file tool to read README.md, then summarize this project in 5 bullet points."}, {"role": "assistant", "step": 1, "thought": "Need to read README.md first to summarize the project.", "tool_calls": [{"name": "read_file", "arguments": {"path": "README.md"}}], "final": null, "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 605, "completion_tokens": 92, "total_tokens": 697, "prompt_tokens_details": {"cached_tokens": 512}, "completion_tokens_details": {"reasoning_tokens": 30}, "prompt_cache_hit_tokens": 512, "prompt_cache_miss_tokens": 93}}, {"role": "tool", "name": "read_file", "arguments": {"path": "README.md"}, "content": "{\"ok\": true, \"result\": \"# LLM Agent Harness\\n\\nA lightweight, locally runnable, model-agnostic harness for LLM agents.\\n\\nThis README assumes the project folder is on your Desktop and is named:\\n\\n```text\\n~/Desktop/llm-agent-harness\\n```\\n\\nIf your folder is somewhere else, replace `~/Desktop/llm-agent-harness` with your actual path.\\n\\n## What It Provides\\n\\n- Agent loop: send context, receive model actions, execute tools, and feed observations back into the run\\n- Tool registry: built-in `list_dir`, `read_file`, `write_file`, and `run_shell`\\n- Provider adapters: connect OpenAI, OpenAI-compatible APIs, Anthropic, Gemini, Ollama, Azure OpenAI, DeepSeek, Groq, or the local echo test provider\\n- Run transcripts: each task writes a JSON transcript under `runs/`\\n- Evaluation reports: success rate, tool accuracy, latency, token usage, cost, failure categories, and cost breakdown\\n- Trace and replay tools: render saved runs as Markdown flow traces or replay the recorded execution\\n- Determinism checks: run the same task repeatedly and measure consistency\\n- Permission policies: read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits\\n- Static dashboard: generate an HTML overview of evals, determinism runs, costs, latency, and transcripts\\n- Local RAG: index workspace documents and retrieve cited chunks for document QA\\n\\n## Quick Start\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm mock\\n```\\n\\nYou should see:\\n\\n```text\\nstatus: completed\\n```\\n\\n## Project Structure\\n\\n```text\\nagent_harness/\\n  cli.py       # Command-line entry point\\n  core.py      # Agent loop and transcript writing\\n  dashboard.py # Static HTML dashboard generation\\n  determinism.py # Repeated-run consistency checks\\n  llm.py       # Mock and subprocess LLM adapters\\n  eval.py      # Evaluation runner and report generation\\n  rag.py       # Local lexical RAG index and query helpers\\n  trace.py     # Trace rendering and transcript replay\\n  tools.py     # Tool registry and built-in tools\\nproviders/\\n  __init__.py\\n  base.py\\n  echo.py\\n  openai.py\\n  openai_compatible.py\\n  anthropic.py\\n  gemini.py\\n  ollama.py\\n  azure_openai.py\\n  deepseek.py\\n  groq.py\\n```\\n\\n## How Providers Work\\n\\nEvery provider is a subprocess adapter. The harness sends JSON to the provider over stdin, and the provider prints JSON to stdout.\\n\\nRun any provider with this pattern:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Your task here\\\" --llm-cmd \\\"python3 -m providers.PROVIDER_NAME\\\"\\n```\\n\\nFor example:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\n## Provider Setup\\n\\nUse this table to choose a provider. Keep API keys in environment variables. Do not write real keys into project files.\\n\\n| Provider | Module | Required setup | Example command |\\n| --- | --- | --- | --- |\\n| Echo test provider | `providers.echo` | No API key. Used to test the subprocess protocol. | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.echo\\\"` |\\n| OpenAI | `providers.openai` | `OPENAI_API_KEY`, optional `OPENAI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai\\\"` |\\n| OpenAI-compatible API | `providers.openai_compatible` | `OPENAI_COMPATIBLE_BASE_URL`, `OPENAI_COMPATIBLE_API_KEY`, `OPENAI_COMPATIBLE_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.openai_compatible\\\"` |\\n| Anthropic | `providers.anthropic` | `ANTHROPIC_API_KEY`, optional `ANTHROPIC_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.anthropic\\\"` |\\n| Gemini | `providers.gemini` | `GEMINI_API_KEY`, optional `GEMINI_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.gemini\\\"` |\\n| Ollama | `providers.ollama` | Local Ollama server, optional `OLLAMA_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.ollama\\\"` |\\n| Azure OpenAI | `providers.azure_openai` | `AZURE_OPENAI_API_KEY`, `AZURE_OPENAI_ENDPOINT`, `AZURE_OPENAI_DEPLOYMENT` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.azure_openai\\\"` |\\n| DeepSeek | `providers.deepseek` | `DEEPSEEK_API_KEY`, optional `DEEPSEEK_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"` |\\n| Groq | `providers.groq` | `GROQ_API_KEY`, optional `GROQ_MODEL` | `python3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.groq\\\"` |\\n\\n## DeepSeek Example\\n\\nDeepSeek uses an OpenAI-compatible API format. This project defaults to the lower-cost V4 Flash model.\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\n\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli \\\"List files in the workspace\\\" --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nTo use the stronger V4 Pro model:\\n\\n```bash\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-pro\\\"\\n```\\n\\n## Evaluation Benchmark\\n\\nThe project includes a small evaluation runner under `evals/`.\\n\\nRun the default benchmark with DeepSeek:\\n\\n```bash\\ncd ~/Desktop/llm-agent-harness\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nIf a provider is slow, increase the subprocess timeout:\\n\\n```bash\\npython3 -m agent_harness.cli eval --tasks evals/tasks.jsonl --llm-timeout 300 --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe eval runner writes:\\n\\n- JSONL results under `evals/results/`\\n- Markdown reports under `evals/reports/`\\n- Per-run transcripts under `runs/`\\n\\nEach eval task checks:\\n\\n- expected final status\\n- expected tool calls\\n- expected text in the final answer\\n- forbidden tool calls\\n- expected text in tool observations\\n- latency\\n- token usage when the provider returns usage data\\n- estimated cost when pricing is configured\\n- prompt and completion cost breakdown\\n- failure category classification\\n- provider errors and timeouts\\n\\nThe default task file is:\\n\\n```text\\nevals/tasks.jsonl\\n```\\n\\nThe expanded benchmark covers:\\n\\n- directory listing\\n- provider directory inspection\\n- README summarization\\n- pricing config reading\\n- flat file writing\\n- nested file writing\\n- workspace path escape denial\\n- shell denial without permission\\n- shell execution with explicit permission\\n- multi-step read-then-write workflows\\n- avoiding unnecessary shell usage\\n- missing-file error handling\\n\\nThe default pricing file is:\\n\\n```text\\nevals/pricing.json\\n```\\n\\nCost estimates are calculated from token usage returned by the provider and the per-1M-token prices in `evals/pricing.json`.\\n\\n## Failure Classification\\n\\nEvaluation results classify failures into categories that are more useful than a generic failed status:\\n\\n- `success`\\n- `planning_error`\\n- `tool_error`\\n- `timeout`\\n- `hallucination`\\n- `permission_denied`\\n- `api_error`\\n- `rate_limit`\\n- `failed`\\n\\nThe category is stored in JSONL results and shown in Markdown reports.\\n\\n## Trace Visualization\\n\\nEvery normal run and eval task writes a transcript under `runs/`. Render any transcript as a Markdown trace:\\n\\n```bash\\npython3 -m agent_harness.cli trace --run-id RUN_ID\\n```\\n\\nThis creates:\\n\\n```text\\nruns/RUN_ID.trace.md\\n```\\n\\nThe trace includes the user task, LLM steps, tool calls, observations, final answer, usage data, and a Mermaid flowchart.\\n\\n## Replay\\n\\nReplay a saved run without calling a model:\\n\\n```bash\\npython3 -m agent_harness.cli replay --run-id RUN_ID\\n```\\n\\nReplay prints the recorded question, model steps, tool calls, observations, and final answer. It is useful for debugging and explaining how a result was produced.\\n\\n## Determinism\\n\\nRun the same task repeatedly to measure stability:\\n\\n```bash\\npython3 -m agent_harness.cli determinism \\\\\\n  --task \\\"Use the read_file tool to read README.md, then summarize this project in 5 bullet points.\\\" \\\\\\n  --runs 20 \\\\\\n  --llm-timeout 300 \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe determinism runner writes:\\n\\n- JSONL run records under `evals/determinism/`\\n- Markdown consistency reports under `evals/determinism/`\\n\\nThe report includes success consistency, final answer consistency, tool sequence consistency, average latency, total tokens, and per-run transcript IDs.\\n\\n## Environment Variables\\n\\nThe `.env.example` file lists the environment variables used by the provider adapters. You can copy values from it into your shell, but do not put real secrets in committed project files.\\n\\nExample:\\n\\n```bash\\nexport DEEPSEEK_API_KEY=\\\"your-deepseek-api-key\\\"\\nexport DEEPSEEK_MODEL=\\\"deepseek-v4-flash\\\"\\n```\\n\\n## Optional SDK Dependencies\\n\\nMost providers in this project use the Python standard library. The OpenAI and Azure OpenAI providers require the official OpenAI Python SDK:\\n\\n```bash\\npython3 -m venv .venv\\nsource .venv/bin/activate\\npython3 -m pip install openai\\n```\\n\\nDeepSeek does not require the OpenAI Python SDK.\\n\\n## Subprocess Protocol\\n\\nThe harness sends this JSON payload to a provider:\\n\\n```json\\n{\\n  \\\"messages\\\": [],\\n  \\\"tools\\\": [],\\n  \\\"max_tool_calls\\\": 8\\n}\\n```\\n\\nThe provider returns a JSON object like this to call a tool:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I should inspect the files.\\\",\\n  \\\"tool_calls\\\": [\\n    {\\\"name\\\": \\\"list_dir\\\", \\\"arguments\\\": {\\\"path\\\": \\\".\\\"}}\\n  ],\\n  \\\"final\\\": null\\n}\\n```\\n\\nWhen the task is complete, the provider returns:\\n\\n```json\\n{\\n  \\\"thought\\\": \\\"I have enough information.\\\",\\n  \\\"tool_calls\\\": [],\\n  \\\"final\\\": \\\"Here is the answer.\\\"\\n}\\n```\\n\\n## Shell Access\\n\\nThe `run_shell` tool is disabled by default. Enable it only for trusted tasks:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run tests\\\" --allow-shell --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse shell allowlists to restrict which executables can run:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Run pwd and list files.\\\" \\\\\\n  --allow-shell \\\\\\n  --shell-allow pwd \\\\\\n  --shell-allow ls \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nUse read-only mode when the agent should inspect but not write files:\\n\\n```bash\\npython3 -m agent_harness.cli \\\"Inspect the project structure.\\\" \\\\\\n  --read-only \\\\\\n  --llm-cmd \\\"python3 -m providers.deepseek\\\"\\n```\\n\\nThe shell tool also blocks common dangerous command patterns such as `sudo`, remote download commands, and destructive root-level deletion.\\n\\n## Static Dashboard\\n\\nGenerate an HTML dashboard from saved eval results, determinism reports, and transcripts:\\n\\n```bash\\npython3 -m agent_harness.cli dashboard\\n```\\n\\nOpen the generated file:\\n\\n```text\\ndashboard/index.html\\n```\\n\\nThe dashboard shows pass rate, latency, estimated cost, transcript count, recent eval results, and recent determinism runs.\\n\\n## Local RAG\\n\\nBuild a local lexical RAG index over Markdown, text, code, JSON, JSONL, TOML, YAML, and similar project files:\\n\\n```bash\\npython3 -m agent_harness.cli rag-index README.md evals agent_harness\\n```\\n\\nAsk a question with citations:\\n\\n```bash\\npython3 -m agent_harness.cli rag-query \\\"How do I run the DeepSeek evaluation benchmark?\\\"\\n```\\n\\nThis local RAG implementation does not require an embedding API. It uses chunking and lexical retrieval, then returns cited source chunks. For production semantic search, replace the ranking function in `agent_harness/rag.py` with an embedding model.\\n\\n## Next Extensions\\n\\n- Add a Web UI or TUI for inspecting each tool call\\n- Add concurrent task execution and retry handling\\n- Add embedding-backed RAG and PDF extraction\\n\"}"}, {"role": "assistant", "step": 2, "thought": "The README.md has been read successfully. I can now summarize the project in 5 bullet points based on the content.", "tool_calls": [], "final": "- **LLM Agent Harness**: A lightweight, locally runnable, model-agnostic framework for building and testing LLM agents with an agent loop, tool registry, and provider adapters (OpenAI, Anthropic, Gemini, DeepSeek, etc.).\n- **Evaluation & Reporting**: Includes an eval runner that checks final status, tool calls, text, latency, token usage, cost, and failure categories; generates JSONL results, Markdown reports, and per-run transcripts.\n- **Trace, Replay & Determinism**: Supports rendering run transcripts as Markdown traces with Mermaid flowcharts, replaying saved runs, and measuring consistency across multiple runs.\n- **Security & Permissions**: Offers read-only mode, shell command allowlists, blocked dangerous commands, and write-size limits; shell execution is disabled by default.\n- **Additional Features**: Static HTML dashboard generation, local lexical RAG for document QA without embeddings, and planned extensions for Web UI, concurrent execution, and embedding-backed RAG.", "provider": "DeepSeekProvider", "model": "deepseek-v4-flash", "usage": {"prompt_tokens": 8407, "completion_tokens": 313, "total_tokens": 8720, "prompt_tokens_details": {"cached_tokens": 384}, "completion_tokens_details": {"reasoning_tokens": 59}, "prompt_cache_hit_tokens": 384, "prompt_cache_miss_tokens": 8023}}], "_source": "/Users/tomzhang/Desktop/llm-agent-harness/runs/20260629T150645Z-ee45db50.json", "tool_sequence": ["read_file"], "usage": {"pr
